<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Đổ Xăm Hường</title>
<meta name="theme-color" content="#9B1B1B"/>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#FAF3E0;font-family:serif;min-height:100vh;}
.page{max-width:520px;margin:0 auto;padding:1.25rem 1rem;}
.card{background:rgba(245,237,214,0.96);border:1px solid #B8860B80;border-radius:10px;padding:14px 16px;margin-bottom:12px;}
h1{font-size:26px;font-weight:500;color:#9B1B1B;text-align:center;}
.subtitle{font-size:13px;color:#B8860B;text-align:center;letter-spacing:.15em;margin-bottom:4px;}
.divider{display:flex;align-items:center;gap:8px;margin:10px 0;}
.divider div:first-child,.divider div:last-child{flex:1;height:.5px;background:#B8860B60;}
.diamond{width:6px;height:6px;background:#B8860B;transform:rotate(45deg);}
input{width:100%;padding:8px 12px;border:1px solid #B8860B60;border-radius:6px;font-size:14px;background:#FAF3E0;color:#2C1810;font-family:serif;outline:none;}
.btn{padding:9px 18px;border-radius:6px;font-size:14px;font-family:serif;cursor:pointer;border:none;}
.btn-primary{background:#9B1B1B;color:#FFF5E6;border:1px solid #9B1B1B;}
.btn-primary:disabled{background:#C9828240;border-color:transparent;cursor:not-allowed;}
.btn-secondary{background:transparent;color:#7A5C3A;border:1px solid #B8860B60;}
.btn-danger{background:transparent;color:#9B1B1B;border:1px solid #9B1B1B60;font-size:12px;padding:4px 10px;}
.btn-full{width:100%;padding:11px;}
.room-code{font-size:28px;font-weight:500;color:#B8860B;letter-spacing:.25em;text-align:center;margin:8px 0;}
.player-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:.5px solid #B8860B30;}
.avatar{min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:500;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:4px;}
.online{background:#22c55e;}
.offline{background:#9ca3af;}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px;}
.badge-ready{background:#dcfce7;color:#166534;}
.badge-host{background:#fef9c3;color:#854d0e;}
.badge-off{background:#f3f4f6;color:#6b7280;}

/* GAME LAYOUT */
.game-wrap{width:100%;max-width:600px;margin:0 auto;padding:.75rem;}
.table-area{position:relative;background:rgba(245,237,214,0.6);border:1px solid #B8860B50;border-radius:16px;padding:8px;margin-bottom:10px;}
.player-seats{display:grid;gap:6px;margin-bottom:8px;}
/* seats layouts */
.seats-2{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
.seats-3{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr;}
.seats-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.seats-5{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;}
.seats-6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;}
.seat{border-radius:8px;padding:6px 8px;text-align:center;border:.5px solid #B8860B50;background:rgba(245,237,214,0.88);position:relative;}
.seat.active{background:#FDEAEA;border-color:#9B1B1B90;}
.seat.offline-seat{opacity:.5;}
.seat-name{font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#A08060;}
.seat-name.active{color:#9B1B1B;}
.seat-pts{font-size:15px;font-weight:500;color:#2C1810;}
.seat-pts.active{color:#9B1B1B;}
.seat-trang{font-size:9px;color:#B8860B;}
.seat-actions{position:absolute;top:2px;right:2px;}

.dice-wrap{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.msg{padding:8px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;line-height:1.5;border:.5px solid #B8860B50;background:#FAF3E0;}
.msg.special{background:#FDEAEA;border-color:#9B1B1B70;color:#9B1B1B;}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.stock-grid{display:grid;gap:4px;justify-items:center;}
.log-box{max-height:80px;overflow-y:auto;padding:6px 12px;}
.log-line{font-size:11px;padding:2px 0;border-bottom:.5px solid #B8860B20;}
.trang-banner{background:#FDEAEA;border:.5px solid #9B1B1B50;border-radius:8px;padding:6px 12px;margin-bottom:8px;text-align:center;font-size:12px;color:#9B1B1B;}
.hand-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.hand-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.tile-label{font-size:10px;font-weight:500;text-align:center;font-family:serif;margin-bottom:2px;}
.tile-count{font-size:9px;text-align:center;font-family:sans-serif;}
.tile-pts{font-size:9px;color:#8B6914;text-align:center;font-family:sans-serif;}
.sidebar{background:rgba(245,237,214,0.96);border:1px solid #B8860B80;border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.sidebar-title{font-size:11px;color:#B8860B;letter-spacing:.08em;margin-bottom:8px;}
.sidebar-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:.5px solid #B8860B20;font-size:12px;color:#2C1810;}
</style>
</head>
<body>
<div id="app">Đang tải...</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,onValue,update}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FC={
  apiKey:"AIzaSyBjhGUkpkAiYvzIUPhnWyuyj3SQJU4LSnw",
  authDomain:"do-xam-huong.firebaseapp.com",
  databaseURL:"https://do-xam-huong-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"do-xam-huong",
  storageBucket:"do-xam-huong.firebasestorage.app",
  messagingSenderId:"273822809628",
  appId:"1:273822809628:web:867e4049d10e0641f8e9d9"
};
const db=getDatabase(initializeApp(FC));

const TILES=[
  {name:"Tú tài",count:32,points:1,col:"#4A7FA4",han:"秀才"},
  {name:"Cử nhân",count:16,points:2,col:"#2E7D4F",han:"舉人"},
  {name:"Tiến sĩ",count:8,points:4,col:"#7B3FA0",han:"進士"},
  {name:"Hội nguyên",count:4,points:8,col:"#C07000",han:"會元"},
  {name:"Thám hoa",count:4,points:16,col:"#0A4D2A",han:"探花"},
  {name:"Trạng nguyên",count:1,points:32,col:"#9B1B1B",han:"狀元"},
];
const TOTAL=65;

function initStock(){return TILES.map(t=>({...t,remaining:t.count}));}
function roll6(){return Array.from({length:6},()=>Math.floor(Math.random()*6)+1);}
function makeid(){return Math.random().toString(36).slice(2,7).toUpperCase();}

function evalRoll(dice){
  const c=[0,0,0,0,0,0];dice.forEach(d=>c[d-1]++);
  const h=c[3];const ten=["nhất","nhị","tam","tứ","ngũ","lục"];
  if(h===6)return{tile:5,label:"Lục hường — THẮNG NGAY!",ta:9999,special:"instant_win"};
  const ld=[0,1,2,4,5].find(i=>c[i]===6);
  if(ld!==undefined)return{tile:5,label:`Lục tử ${ten[ld]} — Trạng nguyên!`,ta:7500+ld,special:null};
  const ng=[0,1,2,4,5].find(i=>c[i]===5);
  if(ng!==undefined){const o=dice.find(d=>d!==ng+1)||0;const da=o===4;
    return{tile:5,label:`Ngũ tử ${ten[ng]}${da?" đại ấn":""}`,ta:da?6500:3000+(ng+1)*10+o,special:null};}
  if(h===4){const r=dice.filter(d=>d!==4);const s=r[0]+r[1];const ch=r[0]===r[1];
    return{tile:5,label:`Tứ hường ${ch?"cáp chính":"cáp xiên"} (tuổi ${s})`,ta:ch?5000+s:4000+s,special:null};}
  const tt2=[0,1,2,3,4,5].filter(i=>c[i]===3);
  if(tt2.length===2)return{tile:-1,label:"Huệ (Trùng tam) — mất lượt!",ta:0,special:"hue"};
  const tu=[0,1,2,4,5].find(i=>c[i]===4);
  if(tu!==undefined)return{tile:4,label:`Tứ tuyệt ${ten[tu]} — Thám hoa!`,ta:0,special:null};
  const pr=[0,1,2,3,4,5].filter(i=>c[i]===2);
  if(pr.length===3)return{tile:4,label:"Phân cam — Thám hoa!",ta:0,special:null};
  if(h===3)return{tile:3,label:"Tam hường — Hội nguyên!",ta:0,special:null};
  if(h===2)return{tile:1,label:"Nhị hường — Cử nhân!",ta:0,special:null};
  if(h===1)return{tile:0,label:"Nhất hường — Tú tài!",ta:0,special:null};
  return{tile:-1,label:"Không có mặt Hường",ta:0,special:null};
}

function returnTiles(gs, pi){
  const ns=gs.stock.map(s=>({...s}));
  let nsl=gs.stockLeft;
  const p=gs.players[pi];
  p.tiles.forEach((n,ti)=>{if(n>0){ns[ti].remaining+=n;nsl+=n;}});
  p.tiles=TILES.map(()=>0);p.points=0;
  let nth=gs.trangHolder,nta=gs.trangAge;
  if(gs.trangHolder===pi){nth=null;nta=0;}
  return{...gs,stock:ns,stockLeft:nsl,trangHolder:nth,trangAge:nta};
}

function applyRoll(gs,pi,dice){
  const ev=evalRoll(dice);
  const np=gs.players.map(p=>({...p,tiles:[...p.tiles]}));
  const ns=gs.stock.map(s=>({...s}));
  let nth=gs.trangHolder,nta=gs.trangAge,nsl=gs.stockLeft,msg="";
  const pn=np[pi].name;
  if(ev.special==="instant_win")return{...gs,players:np,stock:ns,dice,lastMsg:`${pn}: ${ev.label}`,phase:"end"};
  if(ev.special==="hue"){
    // advance turn skipping offline
    let nt=(gs.turn+1)%np.length;
    let tries=0;
    while(np[nt].offline&&tries<np.length){nt=(nt+1)%np.length;tries++;}
    return{...gs,players:np,dice,lastMsg:`${pn}: ${ev.label}`,turn:nt,rolled:false};
  }
  if(ev.tile===5){
    if(nth===null&&ns[5].remaining>0){
      np[pi].tiles[5]++;np[pi].points+=32;ns[5].remaining--;nsl--;nth=pi;nta=ev.ta;
      msg=`${pn}: ${ev.label} — đoạt Trạng!`;
    }else if(nth!==null&&ev.ta>nta){
      const prev=np[nth].name;np[nth].tiles[5]--;np[nth].points-=32;
      np[pi].tiles[5]++;np[pi].points+=32;nth=pi;nta=ev.ta;
      msg=`${pn} cướp Trạng từ ${prev}!`;
    }else if(nth===null){msg=`${pn}: ${ev.label} — hết thẻ!`;}
    else{msg=`${pn}: ${ev.label} — tuổi thấp hơn.`;}
  }else if(ev.tile>=0){
    const t=ev.tile;
    if(ns[t].remaining>0){np[pi].tiles[t]++;np[pi].points+=TILES[t].points;ns[t].remaining--;nsl--;msg=`${pn}: ${ev.label} (+${TILES[t].points}đ)`;}
    else{msg=`${pn}: ${ev.label} — hết thẻ!`;}
  }else{msg=`${pn}: ${ev.label}`;}
  const log=[msg,...(gs.log||[])].slice(0,20);
  return{...gs,players:np,stock:ns,stockLeft:nsl,trangHolder:nth,trangAge:nta,
    dice,lastMsg:msg,log,phase:nsl<=0?"end":gs.phase,rolled:true};
}

// ---- SVG helpers ----
function tileSVG(idx,w=36,h=110,faded=false){
  const t=TILES[idx];if(!t)return"";
  const rc=t.col;
  const chars=t.han.split("").map((ch,i)=>`<text x="18" y="${42+i*16}" text-anchor="middle" font-size="13" fill="${rc}" font-weight="bold" font-family="serif">${ch}</text>`).join("");
  return`<svg width="${w}" height="${h}" viewBox="0 0 36 110" style="opacity:${faded?0.25:1};display:block">
    <rect x="6" y="18" width="24" height="82" rx="3" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="18" rx="9" ry="7" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="10" rx="6.5" ry="5.5" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="4" rx="4" ry="3.5" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="1.2" rx="2" ry="1.5" fill="#F5EDD6" stroke="#c8b06a" stroke-width="0.8"/>
    ${chars}</svg>`;
}

function tileStackHTML(tile,idx){
  const n=Math.min(tile.remaining,4);const empty=tile.remaining===0;
  const rc=TILES[idx]?.col||"#888";
  let stacks="";
  if(empty){stacks=tileSVG(idx,36,110,true);}
  else{for(let i=0;i<n;i++)stacks+=`<div style="position:absolute;top:${i*3}px;left:${i*1.5}px">${tileSVG(idx,36,110,false)}</div>`;}
  return`<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
    <div class="tile-label" style="color:${rc}">${TILES[idx]?.name}</div>
    <div style="position:relative;width:36px;height:116px">${stacks}</div>
    <div class="tile-count" style="color:${empty?"#bbb":rc}">${tile.remaining}/${tile.count}</div>
    <div class="tile-pts">${TILES[idx]?.points}đ</div>
  </div>`;
}

function handHTML(tiles){
  const has=tiles.some(n=>n>0);
  if(!has)return`<div style="font-size:11px;color:#A08060;font-style:italic">Chưa có thẻ</div>`;
  let html="";
  tiles.forEach((n,i)=>{
    if(n<=0)return;
    let stacks="";
    for(let j=0;j<Math.min(n,3);j++)stacks+=`<div style="position:absolute;top:${j*2}px;left:${j}px">${tileSVG(i,27,83,false)}</div>`;
    html+=`<div class="hand-item">
      <div style="position:relative;width:27px;height:${n>1?80:75}px">${stacks}</div>
      ${n>1?`<div style="font-size:9px;color:${TILES[i]?.col};font-family:sans-serif">×${n}</div>`:""}
    </div>`;
  });
  return`<div class="hand-wrap">${html}</div>`;
}

function dieSVG(val,rolling){
  const pos={1:[[50,50]],2:[[28,28],[72,72]],3:[[28,28],[50,50],[72,72]],
    4:[[28,28],[72,28],[28,72],[72,72]],5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
    6:[[28,22],[72,22],[28,50],[72,50],[28,78],[72,78]]};
  const isH=val===4;
  const dots=(pos[val]||[]).map(([cx,cy])=>`<circle cx="${cx}" cy="${cy}" r="${isH?10:8.5}" fill="${isH?"#9B1B1B":"#2C1810"}"/>`).join("");
  return`<svg width="50" height="50" viewBox="0 0 100 100" style="filter:${rolling?"blur(1.5px)":"none"};display:block">
    <rect x="4" y="4" width="92" height="92" rx="14" fill="${isH?"#FFF0F0":"#FFFAF0"}" stroke="${isH?"#9B1B1B":"#B8860B"}" stroke-width="3.5"/>
    <rect x="8" y="8" width="84" height="84" rx="11" fill="none" stroke="${isH?"#D4302030":"#D4A01730"}" stroke-width="1"/>
    ${dots}</svg>`;
}

// ---- STATE ----
let screen="lobby",myName="",myIdx=null,roomCode="",isHost=false;
let gs=null,rolling=false,localDice=[1,2,3,4,5,6];
let unsubFn=null;

function render(){
  const app=document.getElementById("app");
  if(screen==="lobby")app.innerHTML=renderLobby();
  else if(screen==="waiting")app.innerHTML=renderWaiting();
  else if(screen==="game")app.innerHTML=renderGame();
  else if(screen==="end")app.innerHTML=renderEnd();
  bindEvents();
}

// ---- LOBBY ----
function renderLobby(){
  return`<div class="page">
  <div style="text-align:center;margin-bottom:20px;padding-top:12px">
    <div class="subtitle">❧ CUNG ĐÌNH HUẾ ❧</div>
    <h1>Đổ Xăm Hường</h1>
    <div style="font-size:12px;color:#7A5C3A">Chơi online cùng bạn bè</div>
    <div class="divider"><div></div><div class="diamond"></div><div></div></div>
  </div>
  <div class="card">
    <div style="font-size:13px;color:#7A5C3A;margin-bottom:8px">Tên của bạn</div>
    <input id="inp-name" type="text" placeholder="Nhập tên..." value="${myName}"/>
  </div>
  <div class="card">
    <div style="font-size:13px;color:#7A5C3A;margin-bottom:10px">Tạo phòng mới</div>
    <button class="btn btn-primary btn-full" id="btn-create">⟡ Tạo phòng</button>
  </div>
  <div class="card">
    <div style="font-size:13px;color:#7A5C3A;margin-bottom:8px">Vào phòng có sẵn</div>
    <input id="inp-code" type="text" placeholder="Nhập mã phòng..." style="text-align:center;letter-spacing:.2em;font-size:16px;text-transform:uppercase;margin-bottom:10px"/>
    <button class="btn btn-secondary btn-full" id="btn-join">→ Vào phòng</button>
  </div>
  </div>`;
}

// ---- WAITING ----
function renderWaiting(){
  if(!gs)return"<div style='text-align:center;padding:20px;color:#A08060'>Đang tải...</div>";
  const players=gs.players||[];
  const amHost=isHost||(gs.hostIdx===myIdx);
  const onlineCount=players.length;
  const nonHostPlayers=players.filter((_,i)=>i!==gs.hostIdx);
  const allReady=nonHostPlayers.length===0||nonHostPlayers.every(p=>p.ready);
  const canStart=allReady&&onlineCount>=2;
  console.log("DEBUG:",{myIdx,hostIdx:gs.hostIdx,isHost,amHost,allReady,onlineCount,canStart});
  const rows=players.map((p,i)=>{
    const isMe=i===myIdx;const isH2=i===gs.hostIdx;
    const dot=p.offline?'<span class="status-dot offline"></span>':'<span class="status-dot online"></span>';
    const badges=(isH2?'<span class="badge badge-host">Chủ phòng</span>':'')+
      (p.ready&&i!==gs.hostIdx?'<span class="badge badge-ready">Sẵn sàng</span>':'')+
      (p.offline?'<span class="badge badge-off">Offline</span>':'');
    const kickBtn=isHost&&i!==myIdx&&!p.offline
      ?`<button class="btn btn-danger" onclick="kickPlayer(${i})">Kick</button>`:'';
    return`<div class="player-row">
      <div class="avatar" style="background:${isH2?"#9B1B1B":"#B8860B"}">${i+1}</div>
      <div style="flex:1">${dot}<span style="font-size:14px;color:#2C1810;font-family:serif">${p.name}${isMe?" (bạn)":""}</span>${badges}</div>
      ${kickBtn}
    </div>`;
  }).join("");
  return`<div class="page">
  <div style="text-align:center;margin-bottom:16px;padding-top:12px">
    <h1 style="font-size:20px">Phòng chờ</h1>
    <div class="divider"><div></div><div class="diamond"></div><div></div></div>
    <div class="room-code">${roomCode}</div>
    <div style="font-size:12px;color:#7A5C3A">Chia sẻ mã này cho bạn bè · ${onlineCount} người online</div>
  </div>
  <div class="card">${rows}</div>
  ${amHost
    ?`    <button class="btn btn-primary btn-full" id="btn-start" ${!canStart?"disabled":""}>⟡ Bắt đầu chơi (${onlineCount} người)</button>`
    :`<button class="btn ${gs.players[myIdx]?.ready?"btn-secondary":"btn-primary"} btn-full" id="btn-ready">
        ${gs.players[myIdx]?.ready?"✕ Hủy":"⚑ Sẵn sàng"}
      </button>`
  }
  <button class="btn btn-secondary btn-full" onclick="leaveRoom()" style="margin-top:8px">← Thoát phòng</button>
  </div>`;
}

// ---- GAME ----
function renderGame(){
  if(!gs)return"<div style='text-align:center;padding:20px;color:#A08060'>Đang tải...</div>";
  const players=gs.players||[];
  const n=players.length;
  const amHost=isHost||(gs.hostIdx===myIdx);
  const isMyTurn=gs.turn===myIdx;

  const cur=players[gs.turn]; top-left, top-right, bottom-left, bottom-right, top-center, bottom-center
  const seatOrder=[0,1,2,3,4,5].slice(0,n);
  const seatsHTML=seatOrder.map(i=>{
    const p=players[i];if(!p)return"";
    const isMe=i===myIdx;const isActive=i===gs.turn&&!p.offline;
    const dot=p.offline?'<span class="status-dot offline" style="vertical-align:middle"></span>':'<span class="status-dot online" style="vertical-align:middle"></span>';
    const kickBtn=isHost&&i!==myIdx&&!p.offline
      ?`<div class="seat-actions"><button class="btn btn-danger" style="font-size:9px;padding:2px 5px" onclick="kickPlayer(${i})">×</button></div>`:"";
    return`<div class="seat ${isActive?"active":""} ${p.offline?"offline-seat":""}">
      ${kickBtn}
      <div class="seat-name ${isActive?"active":""}">${dot}${p.name}${isMe?"★":""}${i===gs.hostIdx?'👑':''}</div>
      <div class="seat-pts ${isActive?"active":""}">${p.points}đ</div>
      ${gs.trangHolder===i?'<div class="seat-trang">◈ Trạng</div>':""}
      ${p.offline?'<div style="font-size:9px;color:#9ca3af">(offline)</div>':""}
    </div>`;
  }).join("");

  const seatsClass=n<=2?"seats-2":n===3?"seats-3":n===4?"seats-4":"seats-"+n;
  const displayDice=rolling?localDice:(gs.dice||localDice);
  const diceHTML=displayDice.map(d=>dieSVG(d,rolling)).join("");
  const msgSpecial=gs.lastMsg&&(gs.lastMsg.includes("Trạng")||gs.lastMsg.includes("THẮNG"));

  const trangBanner=gs.trangHolder!==null&&players[gs.trangHolder]
    ?`<div class="trang-banner">◈ ${players[gs.trangHolder].name} đang giữ Trạng <span style="color:#7A5C3A;font-size:11px">· tuổi ${gs.trangAge>=9000?"∞":gs.trangAge}</span></div>`
    :`<div class="trang-banner" style="background:#FAF3E0;border-color:#B8860B50;color:#7A5C3A">Chưa có ai giữ Trạng</div>`;

  return`<div class="game-wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div style="font-size:14px;color:#9B1B1B;font-weight:500">Đổ Xăm Hường</div>
    <div style="display:flex;gap:6px;align-items:center;font-size:11px;color:#A08060">
      <span>Phòng: <b style="color:#B8860B">${roomCode}</b></span>
      <span>Thẻ: <b style="color:#B8860B">${gs.stockLeft}</b></span>
      <button class="btn btn-secondary" style="font-size:11px;padding:3px 8px" onclick="leaveRoom()">Thoát</button>
      ${amHost?`<button class="btn btn-secondary" style="font-size:11px;padding:3px 8px" id="btn-end">Kết thúc</button>`:""}
    </div>
  </div>
  <div class="divider"><div></div><div class="diamond"></div><div></div></div>

  <div class="table-area">
    <div class="player-seats ${seatsClass}">${seatsHTML}</div>
  </div>

  <div class="card" style="padding:8px 12px;margin-bottom:8px">
    <div style="font-size:11px;color:#7A5C3A;margin-bottom:4px">Tay bạn (${myName}):</div>
    ${handHTML(players[myIdx]?.tiles||[])}
  </div>

  ${trangBanner}

  <div class="card" style="text-align:center;padding:8px;margin-bottom:8px">
    ${isMyTurn&&!players[myIdx]?.offline
      ?`<div style="color:#9B1B1B;font-weight:500;font-size:13px;margin-bottom:8px">Lượt của bạn!</div>`
      :`<div style="color:#7A5C3A;font-size:13px;margin-bottom:8px">Lượt của <b style="color:#2C1810">${cur?.name||""}${cur?.offline?" (offline)":""}</b>${cur?.offline?" — đang bỏ qua...":""}</div>`
    }
    <div class="dice-wrap">${diceHTML}</div>
    ${gs.lastMsg&&!rolling?`<div class="msg ${msgSpecial?"special":""}">${gs.lastMsg}</div>`:""}
    <div class="btn-row">
      ${isMyTurn&&!gs.rolled&&!players[myIdx]?.offline
        ?`<button class="btn btn-primary" id="btn-roll">${rolling?"Đang gieo...":"⚄ Đổ xúc xắc"}</button>`:""}
      ${isMyTurn&&gs.rolled?`<button class="btn btn-secondary" id="btn-next">Lượt tiếp →</button>`:""}
      ${cur?.offline&&isHost?`<button class="btn btn-secondary" id="btn-skip">Bỏ qua lượt offline</button>`:""}
      ${!isMyTurn&&!cur?.offline?`<div style="font-size:12px;color:#A08060;padding:6px">Đang chờ ${cur?.name}...</div>`:""}
    </div>
  </div>

  <div class="card" style="padding:10px 8px;margin-bottom:8px">
    <div style="font-size:11px;color:#B8860B;text-align:center;letter-spacing:.05em;margin-bottom:8px">— KHO THẺ —</div>
    <div class="stock-grid" style="grid-template-columns:repeat(${TILES.length},1fr)">
      ${gs.stock.map((s,i)=>tileStackHTML(s,i)).join("")}
    </div>
  </div>

  ${gs.log?.length>0?`<div class="card log-box">${gs.log.map((l,i)=>`<div class="log-line" style="color:${i===0?"#2C1810":"#A08060"}">${l}</div>`).join("")}</div>`:""}
  </div>`;
}

// ---- END ----
function renderEnd(){
  if(!gs)return"";
  const sorted=[...gs.players].map((p,i)=>({...p,oi:i}))
    .sort((a,b)=>a.offline===b.offline?b.points-a.points:a.offline?1:-1);
  const rows=sorted.map((p,i)=>`
    <div class="card" style="${i===0&&!p.offline?"background:#FDEAEA;border-color:#9B1B1B80":""}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <div class="avatar" style="background:${i===0&&!p.offline?"#9B1B1B":i===1?"#B8860B":"#7A5C3A"}">${i+1}</div>
        <div style="flex:1;font-size:14px;color:#2C1810;font-family:serif">
          ${p.name}${p.oi===myIdx?" (bạn)":""}
          ${p.offline?'<span class="badge badge-off" style="margin-left:6px">offline</span>':""}
        </div>
        <div style="font-size:18px;font-weight:500;color:${p.offline?"#9ca3af":"#9B1B1B"}">${p.points}<span style="font-size:11px;color:#7A5C3A"> đ</span></div>
      </div>
      ${!p.offline?handHTML(p.tiles):""}
    </div>`).join("");
  return`<div class="page">
  <div style="text-align:center;margin-bottom:16px;padding-top:12px">
    <h1 style="font-size:22px">Kết quả</h1>
    <div class="divider"><div></div><div class="diamond"></div><div></div></div>
  </div>
  ${rows}
  <button class="btn btn-secondary btn-full" id="btn-home" style="margin-top:8px">↺ Về trang chủ</button>
  </div>`;
}

function bindEvents(){
  document.getElementById("inp-name")?.addEventListener("input",e=>myName=e.target.value);
  document.getElementById("btn-create")?.addEventListener("click",createRoom);
  document.getElementById("btn-join")?.addEventListener("click",()=>{
    const code=document.getElementById("inp-code")?.value?.trim()?.toUpperCase();
    if(code)joinRoom(code);
  });
  document.getElementById("btn-start")?.addEventListener("click",startGame);
  document.getElementById("btn-ready")?.addEventListener("click",toggleReady);
  document.getElementById("btn-roll")?.addEventListener("click",doRoll);
  document.getElementById("btn-next")?.addEventListener("click",nextTurn);
  document.getElementById("btn-skip")?.addEventListener("click",skipOffline);
  document.getElementById("btn-end")?.addEventListener("click",()=>{
    if(confirm("Kết thúc ván này?"))endGame();
  });
  document.getElementById("btn-home")?.addEventListener("click",()=>{
    if(unsubFn)unsubFn();
    screen="lobby";myIdx=null;roomCode="";isHost=false;gs=null;render();
  });
}

async function saveGs(state){
  await set(ref(db,`rooms/${roomCode}`),JSON.parse(JSON.stringify(state)));
}

function subscribeRoom(code){
  const r=ref(db,`rooms/${code}`);
  unsubFn=onValue(r,snap=>{
    const data=snap.val();if(!data)return;

    // kiểm tra bị kick ở phòng chờ
    if(screen==="waiting"&&myIdx!==null){
      const myNameNow=gs?.players[myIdx]?.name;
      const stillHere=data.players?.some(p=>p.name===myNameNow);
      if(!stillHere&&myNameNow){
        // bị kick hoặc thoát — kiểm tra kickedName
        if(data.kickedName===myNameNow){
          alert("Bạn đã bị đuổi ra khỏi phòng!");
        }
        if(unsubFn)unsubFn();
        screen="lobby";myIdx=null;roomCode="";isHost=false;gs=null;render();return;
      }
    }

    // kiểm tra bị kick ingame
    if(screen==="game"&&myIdx!==null&&data.kickedIdx===myIdx){
      alert("Bạn đã bị đuổi ra khỏi phòng!");
      // xóa kickedIdx
      const ng={...data,kickedIdx:null};
      set(ref(db,`rooms/${roomCode}`),JSON.parse(JSON.stringify(ng)));
      if(unsubFn)unsubFn();
      screen="lobby";myIdx=null;roomCode="";isHost=false;gs=null;render();return;
    }

    // phòng chờ: cập nhật myIdx nếu danh sách thay đổi
    if(screen==="waiting"&&gs){
      const oldLen=gs.players?.length||0;
      const newLen=data.players?.length||0;
      if(newLen<oldLen&&myIdx!==null){
        const myNewIdx=data.players.findIndex(p=>p.name===(gs.players[myIdx]?.name));
        if(myNewIdx>=0){myIdx=myNewIdx;isHost=data.hostIdx===myIdx;}
      }
    }

    gs=data;
    if(gs.phase==="game"&&screen==="waiting"){screen="game";}
    if(gs.phase==="end"&&(screen==="game"||screen==="waiting")){screen="end";}
    if(screen==="game"&&gs.phase==="game"){
      const onlineCount=gs.players.filter(p=>!p.offline).length;
      if(onlineCount===1&&gs.players[myIdx]&&!gs.players[myIdx].offline){
        if(confirm("Chỉ còn bạn trong phòng. Bạn có muốn đóng phòng không?")){
          endGame();return;
        }
      }
    }
    if(screen==="game"&&gs.phase==="game"&&(isHost||(gs.hostIdx===myIdx))){
      const cur=gs.players[gs.turn];
      if(cur?.offline){setTimeout(()=>skipOffline(),1500);}
    }
    render();
  });
}

async function createRoom(){
  if(!myName.trim()){alert("Nhập tên trước!");return;}
  const code=makeid();roomCode=code;isHost=true;myIdx=0;
  const initGs={
    phase:"waiting",hostIdx:0,
    players:[{name:myName.trim(),tiles:TILES.map(()=>0),points:0,ready:true,offline:false}],
    stock:initStock(),stockLeft:TOTAL,turn:0,
    trangHolder:null,trangAge:0,dice:[1,2,3,4,5,6],rolled:false,lastMsg:"",log:[],
  };
  await set(ref(db,`rooms/${code}`),JSON.parse(JSON.stringify(initGs)));
  gs=initGs;screen="waiting";subscribeRoom(code);render();
}

async function joinRoom(code){
  if(!myName.trim()){alert("Nhập tên trước!");return;}
  const snap=await get(ref(db,`rooms/${code}`));
  if(!snap.exists()){alert("Không tìm thấy phòng!");return;}
  const state=snap.val();
  if(state.phase!=="waiting"){alert("Phòng đã bắt đầu!");return;}
  myIdx=state.players.length;roomCode=code;isHost=false;
  state.players.push({name:myName.trim(),tiles:TILES.map(()=>0),points:0,ready:false,offline:false});
  await set(ref(db,`rooms/${code}`),JSON.parse(JSON.stringify(state)));
  gs=state;screen="waiting";subscribeRoom(code);render();
}

async function toggleReady(){
  if(!gs)return;
  const np=gs.players.map(p=>({...p}));
  np[myIdx].ready=!np[myIdx].ready;
  const ng={...gs,players:np};
  await saveGs(ng);gs=ng;render();
}

async function startGame(){
  if(!gs||gs.players.filter(p=>!p.offline).length<2)return;
  const ng={...gs,phase:"game"};
  await saveGs(ng);gs=ng;screen="game";render();
}

async function endGame(){
  const ng={...gs,phase:"end"};
  await saveGs(ng);gs=ng;screen="end";render();
}

window.kickPlayer=async function(idx){
  if(!gs||!(isHost||(gs.hostIdx===myIdx)))return;
  if(!confirm(`Kick ${gs.players[idx]?.name} ra khỏi phòng?`))return;

  if(screen==="waiting"){
    const np=gs.players.filter((_,i)=>i!==idx);
    let ng={...gs,players:np,kickedName:gs.players[idx]?.name};
    if(gs.hostIdx>idx)ng.hostIdx=gs.hostIdx-1;
    await saveGs(ng);
  } else {
    const np=gs.players.map(p=>({...p}));
    let ng={...gs,players:np,kickedIdx:idx};
    ng=returnTiles(ng,idx);
    ng.players[idx].offline=true;
    ng.log=[`${np[idx].name} đã rời phòng.`,...(ng.log||[])].slice(0,20);
    if(ng.turn===idx)ng=advanceTurn(ng);
    await saveGs(ng);
  }
};

window.leaveRoom=async function(){
  if(!gs){if(unsubFn)unsubFn();screen="lobby";myIdx=null;roomCode="";isHost=false;render();return;}

  // ở phòng chờ: xóa hẳn người chơi khỏi danh sách
  if(screen==="waiting"){
    const np=gs.players.filter((_,i)=>i!==myIdx);
    let ng={...gs,players:np};
    // chuyển host nếu cần
    if(gs.hostIdx===myIdx){
      ng.hostIdx=0; // người đầu tiên còn lại
    } else if(gs.hostIdx>myIdx){
      ng.hostIdx=gs.hostIdx-1;
    }
    // cập nhật myIdx cho những người index > myIdx sẽ tự xử lý qua subscribe
    await saveGs(ng);
    if(unsubFn)unsubFn();
    screen="lobby";myIdx=null;roomCode="";isHost=false;gs=null;render();
    return;
  }

  // ingame: đánh dấu offline
  if(!confirm(`Bạn có chắc muốn thoát phòng không?`))return;
  const np=gs.players.map(p=>({...p}));
  let ng={...gs,players:np};
  ng=returnTiles(ng,myIdx);
  ng.players[myIdx].offline=true;
  ng.log=[`${np[myIdx].name} đã rời phòng.`,...(ng.log||[])].slice(0,20);
  if(gs.hostIdx===myIdx){
    const newHost=ng.players.findIndex((p,i)=>i!==myIdx&&!p.offline);
    if(newHost>=0)ng.hostIdx=newHost;
  }
  if(ng.turn===myIdx)ng=advanceTurn(ng);
  await saveGs(ng);
  if(unsubFn)unsubFn();
  screen="lobby";myIdx=null;roomCode="";isHost=false;gs=null;render();
};

function advanceTurn(ng){
  let nt=(ng.turn+1)%ng.players.length;
  let tries=0;
  while(ng.players[nt]?.offline&&tries<ng.players.length){nt=(nt+1)%ng.players.length;tries++;}
  return{...ng,turn:nt,rolled:false};
}

async function skipOffline(){
  if(!gs||!isHost)return;
  const cur=gs.players[gs.turn];
  if(!cur?.offline)return;
  const ng=advanceTurn({...gs});
  ng.lastMsg=`Bỏ qua lượt của ${cur.name} (offline).`;
  await saveGs(ng);
}

function doRoll(){
  if(rolling||!gs||gs.rolled||gs.turn!==myIdx||gs.players[myIdx]?.offline)return;
  rolling=true;render();let c=0;
  const iv=setInterval(()=>{
    localDice=roll6();
    const dw=document.querySelector(".dice-wrap");
    if(dw)dw.innerHTML=localDice.map(d=>dieSVG(d,true)).join("");
    c++;
    if(c>=12){
      clearInterval(iv);rolling=false;
      const final=roll6();localDice=final;
      const newGs=applyRoll(gs,myIdx,final);
      saveGs(newGs);gs=newGs;render();
    }
  },70);
}

async function nextTurn(){
  if(!gs)return;
  const ng=advanceTurn({...gs});
  await saveGs(ng);gs=ng;render();
}

render();
</script>
</body>
</html>
