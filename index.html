<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Đổ Xăm Hường</title>
<meta name="theme-color" content="#9B1B1B"/>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF3E0;font-family:serif;min-height:100vh}
.page{max-width:520px;margin:0 auto;padding:1.25rem 1rem}
.card{background:rgba(245,237,214,0.96);border:1px solid #B8860B80;border-radius:10px;padding:14px 16px;margin-bottom:12px}
h1{font-size:26px;font-weight:500;color:#9B1B1B;text-align:center}
.sub{font-size:13px;color:#B8860B;text-align:center;letter-spacing:.15em;margin-bottom:4px}
.div{display:flex;align-items:center;gap:8px;margin:10px 0}
.div>div:first-child,.div>div:last-child{flex:1;height:.5px;background:#B8860B60}
.dia{width:6px;height:6px;background:#B8860B;transform:rotate(45deg)}
input{width:100%;padding:8px 12px;border:1px solid #B8860B60;border-radius:6px;font-size:14px;background:#FAF3E0;color:#2C1810;font-family:serif;outline:none}
.btn{padding:9px 18px;border-radius:6px;font-size:14px;font-family:serif;cursor:pointer;border:none;transition:opacity .15s}
.bp{background:#9B1B1B;color:#FFF5E6;border:1px solid #9B1B1B}
.bp:disabled{background:#C9828240;border-color:transparent;cursor:not-allowed}
.bs{background:transparent;color:#7A5C3A;border:1px solid #B8860B60}
.bd{background:transparent;color:#9B1B1B;border:1px solid #9B1B1B60;font-size:12px;padding:4px 10px}
.bf{width:100%;padding:11px}
.code{font-size:28px;font-weight:500;color:#B8860B;letter-spacing:.25em;text-align:center;margin:8px 0}
.pr{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:.5px solid #B8860B30}
.av{min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.on{background:#22c55e}.off{background:#9ca3af}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px}
.bhost{background:#fef9c3;color:#854d0e}
.bready{background:#dcfce7;color:#166534}
.boff{background:#f3f4f6;color:#6b7280}
/* game */
.gw{max-width:560px;margin:0 auto;padding:.75rem}
.seats{display:grid;gap:6px;margin-bottom:8px}
.s2{grid-template-columns:1fr 1fr}
.s3{grid-template-columns:1fr 1fr 1fr}
.s4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.s5{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}
.s6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}
.seat{border-radius:8px;padding:6px 8px;text-align:center;border:.5px solid #B8860B50;background:rgba(245,237,214,0.88);position:relative}
.seat.act{background:#FDEAEA;border-color:#9B1B1B90}
.seat.ofl{opacity:.5}
.sn{font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#A08060}
.sn.act{color:#9B1B1B}
.sp{font-size:15px;font-weight:500;color:#2C1810}
.sp.act{color:#9B1B1B}
.sa{position:absolute;top:2px;right:2px}
.dw{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.msg{padding:8px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;line-height:1.5;border:.5px solid #B8860B50;background:#FAF3E0}
.msg.sp2{background:#FDEAEA;border-color:#9B1B1B70;color:#9B1B1B}
.br{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.sg{display:grid;gap:4px;justify-items:center}
.lb{max-height:80px;overflow-y:auto;padding:6px 12px}
.ll{font-size:11px;padding:2px 0;border-bottom:.5px solid #B8860B20}
.tb{background:#FDEAEA;border:.5px solid #9B1B1B50;border-radius:8px;padding:6px 12px;margin-bottom:8px;text-align:center;font-size:12px;color:#9B1B1B}
.hw{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.hi{display:flex;flex-direction:column;align-items:center;gap:1px}
.tl{font-size:10px;font-weight:500;text-align:center;font-family:serif;margin-bottom:2px}
.tc{font-size:9px;text-align:center;font-family:sans-serif}
.tp{font-size:9px;color:#8B6914;text-align:center;font-family:sans-serif}
</style>
</head>
<body>
<div id="app">Đang tải...</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db=getDatabase(initializeApp({
  apiKey:"AIzaSyBjhGUkpkAiYvzIUPhnWyuyj3SQJU4LSnw",
  authDomain:"do-xam-huong.firebaseapp.com",
  databaseURL:"https://do-xam-huong-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"do-xam-huong",
  storageBucket:"do-xam-huong.firebasestorage.app",
  messagingSenderId:"273822809628",
  appId:"1:273822809628:web:867e4049d10e0641f8e9d9"
}));

const TILES=[
  {name:"Tú tài",count:32,points:1,col:"#4A7FA4",han:"秀才"},
  {name:"Cử nhân",count:16,points:2,col:"#2E7D4F",han:"舉人"},
  {name:"Tiến sĩ",count:8,points:4,col:"#7B3FA0",han:"進士"},
  {name:"Hội nguyên",count:4,points:8,col:"#C07000",han:"會元"},
  {name:"Thám hoa",count:4,points:16,col:"#0A4D2A",han:"探花"},
  {name:"Trạng nguyên",count:1,points:32,col:"#9B1B1B",han:"狀元"},
];
const TOTAL=65;
const TEN=["nhất","nhị","tam","tứ","ngũ","lục"];

function initStock(){return TILES.map(t=>({...t,remaining:t.count}));}
function roll6(){return Array.from({length:6},()=>Math.floor(Math.random()*6)+1);}
function makeid(){return Math.random().toString(36).slice(2,7).toUpperCase();}
function jclone(o){return JSON.parse(JSON.stringify(o));}

// ---- GAME LOGIC ----
function evalRoll(dice){
  const c=[0,0,0,0,0,0];
  dice.forEach(d=>c[d-1]++);
  const h=c[3];
  if(h===6) return{tile:5,label:"Lục hường — THẮNG NGAY!",ta:9999,special:"instant_win"};
  const ld=[0,1,2,4,5].find(k=>c[k]===6);
  if(ld!==undefined) return{tile:5,label:`Lục tử ${TEN[ld]} — Trạng nguyên!`,ta:7500+ld,special:null};
  const ng=[0,1,2,4,5].find(k=>c[k]===5);
  if(ng!==undefined){
    const o=dice.find(d=>d!==ng+1)||0;
    const da=o===4;
    return{tile:5,label:`Ngũ tử ${TEN[ng]}${da?" đại ấn":""}`,ta:da?6500:3000+(ng+1)*10+o,special:null};
  }
  if(h===4){
    const r=dice.filter(d=>d!==4);
    const s=r[0]+r[1];const ch=r[0]===r[1];
    return{tile:5,label:`Tứ hường ${ch?"cáp chính":"cáp xiên"} (tuổi ${s})`,ta:ch?5000+s:4000+s,special:null};
  }
  const tam=[0,1,2,3,4,5].filter(k=>c[k]===3);
  if(tam.length===2) return{tile:-1,label:"Huệ (Trùng tam) — mất lượt!",ta:0,special:"hue"};
  const tu=[0,1,2,4,5].find(k=>c[k]===4);
  if(tu!==undefined) return{tile:4,label:`Tứ tuyệt ${TEN[tu]} — Thám hoa!`,ta:0,special:null};
  const pr=[0,1,2,3,4,5].filter(k=>c[k]===2);
  if(pr.length===3) return{tile:4,label:"Phân cam — Thám hoa!",ta:0,special:null};
  if(h===3) return{tile:3,label:"Tam hường — Hội nguyên!",ta:0,special:null};
  if(h===2) return{tile:1,label:"Nhị hường — Cử nhân!",ta:0,special:null};
  if(h===1) return{tile:0,label:"Nhất hường — Tú tài!",ta:0,special:null};
  return{tile:-1,label:"Không có mặt Hường",ta:0,special:null};
}

function nextAliveTurn(gs,from){
  const n=gs.players.length;
  let t=(from+1)%n;
  for(let k=0;k<n;k++){if(!gs.players[t].offline)return t;t=(t+1)%n;}
  return from;
}

function returnTiles(gs,pi){
  const ns=gs.stock.map(s=>({...s}));
  let nsl=gs.stockLeft;
  gs.players[pi].tiles.forEach((n,ti)=>{if(n>0){ns[ti].remaining+=n;nsl+=n;}});
  gs.players[pi].tiles=TILES.map(()=>0);
  gs.players[pi].points=0;
  if(gs.trangHolder===pi){gs.trangHolder=null;gs.trangAge=0;}
  gs.stock=ns;gs.stockLeft=nsl;
  return gs;
}

function applyRoll(gs0,pi,dice){
  const gs=jclone(gs0);
  const ev=evalRoll(dice);
  const pn=gs.players[pi].name;
  gs.dice=dice;
  if(ev.special==="instant_win"){gs.lastMsg=`${pn}: ${ev.label}`;gs.phase="end";return gs;}
  if(ev.special==="hue"){
    gs.lastMsg=`${pn}: ${ev.label}`;
    gs.turn=nextAliveTurn(gs,gs.turn);gs.rolled=false;return gs;
  }
  let msg="";
  if(ev.tile===5){
    if(gs.trangHolder===null&&gs.stock[5].remaining>0){
      gs.players[pi].tiles[5]++;gs.players[pi].points+=32;
      gs.stock[5].remaining--;gs.stockLeft--;
      gs.trangHolder=pi;gs.trangAge=ev.ta;
      msg=`${pn}: ${ev.label} — đoạt Trạng!`;
    } else if(gs.trangHolder!==null&&ev.ta>gs.trangAge){
      const prev=gs.players[gs.trangHolder].name;
      gs.players[gs.trangHolder].tiles[5]--;gs.players[gs.trangHolder].points-=32;
      gs.players[pi].tiles[5]++;gs.players[pi].points+=32;
      gs.trangHolder=pi;gs.trangAge=ev.ta;
      msg=`${pn} cướp Trạng từ ${prev}!`;
    } else if(gs.trangHolder===null){
      msg=`${pn}: ${ev.label} — hết thẻ!`;
    } else {
      msg=`${pn}: ${ev.label} — tuổi thấp hơn.`;
    }
  } else if(ev.tile>=0){
    const t=ev.tile;
    if(gs.stock[t].remaining>0){
      gs.players[pi].tiles[t]++;gs.players[pi].points+=TILES[t].points;
      gs.stock[t].remaining--;gs.stockLeft--;
      msg=`${pn}: ${ev.label} (+${TILES[t].points}đ)`;
    } else {
      msg=`${pn}: ${ev.label} — hết thẻ!`;
    }
  } else {
    msg=`${pn}: ${ev.label}`;
  }
  gs.lastMsg=msg;
  gs.log=[msg,...(gs.log||[])].slice(0,20);
  gs.rolled=true;
  if(gs.stockLeft<=0)gs.phase="end";
  return gs;
}

// ---- SVG ----
function tileSVG(idx,w,h,faded){
  const t=TILES[idx];if(!t)return"";
  const rc=t.col;
  const chars=t.han.split("").map((ch,ci)=>
    `<text x="18" y="${42+ci*16}" text-anchor="middle" font-size="13" fill="${rc}" font-weight="bold" font-family="serif">${ch}</text>`
  ).join("");
  return`<svg width="${w}" height="${h}" viewBox="0 0 36 110" style="opacity:${faded?0.25:1};display:block">
    <rect x="6" y="18" width="24" height="82" rx="3" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="18" rx="9" ry="7" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="10" rx="6.5" ry="5.5" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="4" rx="4" ry="3.5" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="1.2" rx="2" ry="1.5" fill="#F5EDD6" stroke="#c8b06a" stroke-width="0.8"/>
    ${chars}</svg>`;
}

function tileStackHTML(tile,idx){
  const n=Math.min(tile.remaining,4);
  const empty=tile.remaining===0;
  const rc=TILES[idx]?.col||"#888";
  let stacks=empty?tileSVG(idx,36,110,true):"";
  if(!empty){for(let k=0;k<n;k++)stacks+=`<div style="position:absolute;top:${k*3}px;left:${k*1.5}px">${tileSVG(idx,36,110,false)}</div>`;}
  return`<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
    <div class="tl" style="color:${rc}">${TILES[idx].name}</div>
    <div style="position:relative;width:36px;height:116px">${stacks}</div>
    <div class="tc" style="color:${empty?"#bbb":rc}">${tile.remaining}/${tile.count}</div>
    <div class="tp">${TILES[idx].points}đ</div>
  </div>`;
}

function handHTML(tiles){
  const has=tiles.some(n=>n>0);
  if(!has)return`<div style="font-size:11px;color:#A08060;font-style:italic">Chưa có thẻ</div>`;
  let html="";
  tiles.forEach((n,ti)=>{
    if(n<=0)return;
    let stacks="";
    for(let k=0;k<Math.min(n,3);k++)
      stacks+=`<div style="position:absolute;top:${k*2}px;left:${k}px">${tileSVG(ti,27,83,false)}</div>`;
    html+=`<div class="hi">
      <div style="position:relative;width:27px;height:${n>1?80:75}px">${stacks}</div>
      ${n>1?`<div style="font-size:9px;color:${TILES[ti].col};font-family:sans-serif">×${n}</div>`:""}
    </div>`;
  });
  return`<div class="hw">${html}</div>`;
}

function dieSVG(val,rolling){
  const pos={1:[[50,50]],2:[[28,28],[72,72]],3:[[28,28],[50,50],[72,72]],
    4:[[28,28],[72,28],[28,72],[72,72]],5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
    6:[[28,22],[72,22],[28,50],[72,50],[28,78],[72,78]]};
  const isH=val===4;
  const dots=(pos[val]||[]).map(([cx,cy])=>
    `<circle cx="${cx}" cy="${cy}" r="${isH?10:8.5}" fill="${isH?"#9B1B1B":"#2C1810"}"/>`
  ).join("");
  return`<svg width="50" height="50" viewBox="0 0 100 100" style="filter:${rolling?"blur(1.5px)":"none"};display:block">
    <rect x="4" y="4" width="92" height="92" rx="14" fill="${isH?"#FFF0F0":"#FFFAF0"}" stroke="${isH?"#9B1B1B":"#B8860B"}" stroke-width="3.5"/>
    <rect x="8" y="8" width="84" height="84" rx="11" fill="none" stroke="${isH?"#D4302030":"#D4A01730"}" stroke-width="1"/>
    ${dots}</svg>`;
}

function divider(){return`<div class="div"><div></div><div class="dia"></div><div></div></div>`;}

// ---- STATE ----
let screen="lobby",myName="",myIdx=null,roomCode="",isHost=false;
let gs=null,rolling=false,localDice=[1,2,3,4,5,6],unsub=null;
let lastOnlineCount=null;

function amHost(){return gs&&gs.hostIdx===myIdx;}

async function save(state){
  await set(ref(db,`rooms/${roomCode}`),jclone(state));
}

function subscribe(code){
  unsub=onValue(ref(db,`rooms/${code}`),snap=>{
    const data=snap.val();if(!data)return;

    // bị kick ở phòng chờ: tên biến mất khỏi danh sách
    if(screen==="waiting"&&myIdx!==null&&gs){
      const myNameNow=gs.players[myIdx]?.name;
      const stillHere=data.players?.some(p=>p.name===myNameNow);
      if(!stillHere&&myNameNow){
        if(data.kickedName===myNameNow)alert("Bạn đã bị đuổi ra khỏi phòng!");
        cleanup();return;
      }
      // cập nhật myIdx nếu danh sách co lại
      if(data.players.length<gs.players.length){
        const ni=data.players.findIndex(p=>p.name===myNameNow);
        if(ni>=0){myIdx=ni;isHost=data.hostIdx===myIdx;}
      }
    }

    // bị kick ingame
    if(screen==="game"&&myIdx!==null&&data.kickedIdx===myIdx){
      alert("Bạn đã bị đuổi ra khỏi phòng!");
      const ng=jclone(data);ng.kickedIdx=null;
      set(ref(db,`rooms/${code}`),ng);
      cleanup();return;
    }

    gs=data;

    // chuyển màn
    if(gs.phase==="game"&&screen==="waiting")screen="game";
    if(gs.phase==="end"&&(screen==="game"||screen==="waiting"))screen="end";

    // ingame: còn 1 người thì hỏi
    if(screen==="game"&&gs.phase==="game"){
      const oc=gs.players.filter(p=>!p.offline).length;
      if(oc===1&&gs.players[myIdx]&&!gs.players[myIdx].offline&&lastOnlineCount>1){
        lastOnlineCount=oc;
        if(confirm("Chỉ còn bạn trong phòng. Bạn có muốn đóng phòng không?")){
          endGame();return;
        }
      }
      lastOnlineCount=oc;
    }

    // auto-skip lượt offline (chỉ host xử lý)
    if(screen==="game"&&gs.phase==="game"&&amHost()){
      const cur=gs.players[gs.turn];
      if(cur?.offline)setTimeout(skipOffline,1500);
    }

    render();
  });
}

function cleanup(){
  if(unsub)unsub();
  screen="lobby";myIdx=null;roomCode="";isHost=false;gs=null;lastOnlineCount=null;
  render();
}

// ---- SCREENS ----
function renderLobby(){
  return`<div class="page">
    <div style="text-align:center;margin-bottom:20px;padding-top:12px">
      <div class="sub">❧ CUNG ĐÌNH HUẾ ❧</div>
      <h1>Đổ Xăm Hường</h1>
      <div style="font-size:12px;color:#7A5C3A">Chơi online cùng bạn bè</div>
      ${divider()}
    </div>
    <div class="card">
      <div style="font-size:13px;color:#7A5C3A;margin-bottom:8px">Tên của bạn</div>
      <input id="inp-name" type="text" placeholder="Nhập tên..." value="${myName}"/>
    </div>
    <div class="card">
      <div style="font-size:13px;color:#7A5C3A;margin-bottom:10px">Tạo phòng mới</div>
      <button class="btn bp bf" id="btn-create">⟡ Tạo phòng</button>
    </div>
    <div class="card">
      <div style="font-size:13px;color:#7A5C3A;margin-bottom:8px">Vào phòng có sẵn</div>
      <input id="inp-code" type="text" placeholder="Nhập mã phòng..." style="text-align:center;letter-spacing:.2em;font-size:16px;text-transform:uppercase;margin-bottom:10px"/>
      <button class="btn bs bf" id="btn-join">→ Vào phòng</button>
    </div>
  </div>`;
}

function renderWaiting(){
  if(!gs)return`<div style="text-align:center;padding:20px;color:#A08060">Đang tải...</div>`;
  const ps=gs.players||[];
  const iAm=amHost();
  const nonHost=ps.filter((_,i)=>i!==gs.hostIdx);
  const allReady=nonHost.length===0||nonHost.every(p=>p.ready);
  const canStart=allReady&&ps.length>=2;
  const rows=ps.map((p,i)=>{
    const isMe=i===myIdx;
    const iH=i===gs.hostIdx;
    const dot=`<span class="dot ${p.offline?"off":"on"}"></span>`;
    const bgs=(iH?`<span class="badge bhost">Chủ phòng</span>`:"")
      +(p.ready&&!iH?`<span class="badge bready">Sẵn sàng</span>`:"");
    const kick=iAm&&i!==myIdx?`<button class="btn bd" onclick="doKick(${i})">Kick</button>`:"";
    return`<div class="pr">
      <div class="av" style="background:${iH?"#9B1B1B":"#B8860B"}">${i+1}</div>
      <div style="flex:1">${dot}<span style="font-size:14px;color:#2C1810">${p.name}${isMe?" (bạn)":""}</span>${bgs}</div>
      ${kick}
    </div>`;
  }).join("");
  return`<div class="page">
    <div style="text-align:center;margin-bottom:16px;padding-top:12px">
      <h1 style="font-size:20px">Phòng chờ</h1>
      ${divider()}
      <div class="code">${roomCode}</div>
      <div style="font-size:12px;color:#7A5C3A">Chia sẻ mã này cho bạn bè · ${ps.length} người</div>
    </div>
    <div class="card">${rows}</div>
    ${iAm
      ?`<button class="btn bp bf" id="btn-start" ${canStart?"":' disabled'}>⟡ Bắt đầu chơi (${ps.length} người)</button>`
      :`<button class="btn ${gs.players[myIdx]?.ready?"bs":"bp"} bf" id="btn-ready">
          ${gs.players[myIdx]?.ready?"✕ Hủy":"⚑ Sẵn sàng"}
        </button>`
    }
    <button class="btn bs bf" onclick="doLeave()" style="margin-top:8px">← Thoát phòng</button>
  </div>`;
}

function renderGame(){
  if(!gs)return`<div style="text-align:center;padding:20px;color:#A08060">Đang tải...</div>`;
  const ps=gs.players;
  const n=ps.length;
  const iAm=amHost();
  const isMyTurn=gs.turn===myIdx;
  const cur=ps[gs.turn];
  const displayDice=rolling?localDice:(gs.dice||localDice);

  const seatsHTML=ps.map((p,si)=>{
    const isMe=si===myIdx;
    const active=si===gs.turn&&!p.offline;
    const dot=`<span class="dot ${p.offline?"off":"on"}" style="vertical-align:middle"></span>`;
    const kick=iAm&&si!==myIdx&&!p.offline
      ?`<div class="sa"><button class="btn bd" style="font-size:9px;padding:2px 5px" onclick="doKick(${si})">×</button></div>`:""
    return`<div class="seat${active?" act":""}${p.offline?" ofl":""}">
      ${kick}
      <div class="sn${active?" act":""}">${dot}${p.name}${isMe?"★":""}${si===gs.hostIdx?" 👑":""}</div>
      <div class="sp${active?" act":""}">${p.points}đ</div>
      ${gs.trangHolder===si?`<div style="font-size:9px;color:#B8860B">◈ Trạng</div>`:""}
      ${p.offline?`<div style="font-size:9px;color:#9ca3af">(offline)</div>`:""}
    </div>`;
  }).join("");

  const scls=["","s2","s2","s3","s4","s5","s6"][n]||"s4";
  const trangBanner=gs.trangHolder!==null&&ps[gs.trangHolder]
    ?`<div class="tb">◈ ${ps[gs.trangHolder].name} đang giữ Trạng <span style="color:#7A5C3A;font-size:11px">· tuổi ${gs.trangAge>=9000?"∞":gs.trangAge}</span></div>`
    :`<div class="tb" style="background:#FAF3E0;border-color:#B8860B50;color:#7A5C3A">Chưa có ai giữ Trạng</div>`;
  const msgSpecial=gs.lastMsg&&(gs.lastMsg.includes("Trạng")||gs.lastMsg.includes("THẮNG"));

  return`<div class="gw">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:14px;color:#9B1B1B;font-weight:500">Đổ Xăm Hường</div>
      <div style="display:flex;gap:6px;align-items:center;font-size:11px;color:#A08060">
        <span>Phòng: <b style="color:#B8860B">${roomCode}</b></span>
        <span>Thẻ: <b style="color:#B8860B">${gs.stockLeft}</b></span>
        <button class="btn bs" style="font-size:11px;padding:3px 8px" onclick="doLeave()">Thoát</button>
        ${iAm?`<button class="btn bs" style="font-size:11px;padding:3px 8px" id="btn-end">Kết thúc</button>`:""}
      </div>
    </div>
    ${divider()}
    <div style="background:rgba(245,237,214,0.6);border:1px solid #B8860B50;border-radius:12px;padding:8px;margin-bottom:8px">
      <div class="seats ${scls}">${seatsHTML}</div>
    </div>
    <div class="card" style="padding:8px 12px;margin-bottom:8px">
      <div style="font-size:11px;color:#7A5C3A;margin-bottom:4px">Tay bạn (${myName}):</div>
      ${handHTML(ps[myIdx]?.tiles||[])}
    </div>
    ${trangBanner}
    <div class="card" style="text-align:center;padding:8px;margin-bottom:8px">
      ${isMyTurn&&!ps[myIdx]?.offline
        ?`<div style="color:#9B1B1B;font-weight:500;font-size:13px;margin-bottom:8px">Lượt của bạn!</div>`
        :`<div style="color:#7A5C3A;font-size:13px;margin-bottom:8px">Lượt: <b style="color:#2C1810">${cur?.name||""}${cur?.offline?" (offline)":""}</b></div>`
      }
      <div class="dw">${displayDice.map(d=>dieSVG(d,rolling)).join("")}</div>
      ${gs.lastMsg&&!rolling?`<div class="msg${msgSpecial?" sp2":""}">${gs.lastMsg}</div>`:""}
      <div class="br">
        ${isMyTurn&&!gs.rolled&&!ps[myIdx]?.offline?`<button class="btn bp" id="btn-roll">${rolling?"Đang gieo...":"⚄ Đổ xúc xắc"}</button>`:""}
        ${isMyTurn&&gs.rolled?`<button class="btn bs" id="btn-next">Lượt tiếp →</button>`:""}
        ${cur?.offline&&iAm?`<button class="btn bs" id="btn-skip">Bỏ qua lượt offline</button>`:""}
        ${!isMyTurn&&!cur?.offline?`<div style="font-size:12px;color:#A08060;padding:6px">Đang chờ ${cur?.name}...</div>`:""}
      </div>
    </div>
    <div class="card" style="padding:10px 8px;margin-bottom:8px">
      <div style="font-size:11px;color:#B8860B;text-align:center;letter-spacing:.05em;margin-bottom:8px">— KHO THẺ —</div>
      <div class="sg" style="grid-template-columns:repeat(${TILES.length},1fr)">
        ${gs.stock.map((s,si2)=>tileStackHTML(s,si2)).join("")}
      </div>
    </div>
    ${gs.log?.length?`<div class="card lb">${gs.log.map((l,li)=>`<div class="ll" style="color:${li===0?"#2C1810":"#A08060"}">${l}</div>`).join("")}</div>`:""}
  </div>`;
}

function renderEnd(){
  if(!gs)return"";
  const sorted=[...gs.players].map((p,i)=>({...p,oi:i}))
    .sort((a,b)=>a.offline===b.offline?b.points-a.points:a.offline?1:-1);
  const rows=sorted.map((p,i)=>`
    <div class="card" style="${i===0&&!p.offline?"background:#FDEAEA;border-color:#9B1B1B80":""}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <div class="av" style="background:${i===0&&!p.offline?"#9B1B1B":i===1?"#B8860B":"#7A5C3A"}">${i+1}</div>
        <div style="flex:1;font-size:14px;color:#2C1810">
          ${p.name}${p.oi===myIdx?" (bạn)":""}
          ${p.offline?`<span class="badge boff" style="margin-left:6px">offline</span>`:""}
        </div>
        <div style="font-size:18px;font-weight:500;color:${p.offline?"#9ca3af":"#9B1B1B"}">${p.points}<span style="font-size:11px;color:#7A5C3A"> đ</span></div>
      </div>
      ${!p.offline?handHTML(p.tiles):""}
    </div>`).join("");
  return`<div class="page">
    <div style="text-align:center;margin-bottom:16px;padding-top:12px">
      <h1 style="font-size:22px">Kết quả</h1>
      ${divider()}
    </div>
    ${rows}
    <button class="btn bs bf" id="btn-home" style="margin-top:8px">↺ Về trang chủ</button>
  </div>`;
}

function render(){
  const app=document.getElementById("app");
  if(screen==="lobby")app.innerHTML=renderLobby();
  else if(screen==="waiting")app.innerHTML=renderWaiting();
  else if(screen==="game")app.innerHTML=renderGame();
  else app.innerHTML=renderEnd();
  bindEvents();
}

function bindEvents(){
  document.getElementById("inp-name")?.addEventListener("input",e=>myName=e.target.value);
  document.getElementById("btn-create")?.addEventListener("click",doCreate);
  document.getElementById("btn-join")?.addEventListener("click",()=>{
    const c=document.getElementById("inp-code")?.value?.trim()?.toUpperCase();
    if(c)doJoin(c);
  });
  document.getElementById("btn-start")?.addEventListener("click",doStart);
  document.getElementById("btn-ready")?.addEventListener("click",doReady);
  document.getElementById("btn-roll")?.addEventListener("click",doRoll);
  document.getElementById("btn-next")?.addEventListener("click",doNext);
  document.getElementById("btn-skip")?.addEventListener("click",skipOffline);
  document.getElementById("btn-end")?.addEventListener("click",()=>{if(confirm("Kết thúc ván?"))endGame();});
  document.getElementById("btn-home")?.addEventListener("click",cleanup);
}

// ---- ACTIONS ----
async function doCreate(){
  if(!myName.trim()){alert("Nhập tên trước!");return;}
  const code=makeid();
  roomCode=code;isHost=true;myIdx=0;
  const initGs={
    phase:"waiting",hostIdx:0,
    players:[{name:myName.trim(),tiles:TILES.map(()=>0),points:0,ready:true,offline:false}],
    stock:initStock(),stockLeft:TOTAL,turn:0,
    trangHolder:null,trangAge:0,dice:[1,2,3,4,5,6],rolled:false,lastMsg:"",log:[],
  };
  await set(ref(db,`rooms/${code}`),jclone(initGs));
  gs=initGs;screen="waiting";subscribe(code);render();
}

async function doJoin(code){
  if(!myName.trim()){alert("Nhập tên trước!");return;}
  const snap=await get(ref(db,`rooms/${code}`));
  if(!snap.exists()){alert("Không tìm thấy phòng!");return;}
  const state=snap.val();
  if(state.phase!=="waiting"){alert("Phòng đã bắt đầu!");return;}
  myIdx=state.players.length;roomCode=code;isHost=false;
  state.players.push({name:myName.trim(),tiles:TILES.map(()=>0),points:0,ready:false,offline:false});
  await set(ref(db,`rooms/${code}`),jclone(state));
  gs=state;screen="waiting";subscribe(code);render();
}

async function doStart(){
  if(!gs||gs.players.length<2)return;
  const ng=jclone(gs);ng.phase="game";
  await save(ng);gs=ng;screen="game";render();
}

async function doReady(){
  if(!gs)return;
  const ng=jclone(gs);
  ng.players[myIdx].ready=!ng.players[myIdx].ready;
  await save(ng);gs=ng;render();
}

async function endGame(){
  const ng=jclone(gs);ng.phase="end";
  await save(ng);gs=ng;screen="end";render();
}

window.doLeave=async function(){
  if(!gs){cleanup();return;}
  if(screen==="game"&&!confirm("Bạn có chắc muốn thoát phòng không?"))return;
  if(screen==="waiting"){
    const ng=jclone(gs);
    ng.players.splice(myIdx,1);
    if(ng.hostIdx>myIdx)ng.hostIdx--;
    else if(ng.hostIdx===myIdx)ng.hostIdx=0;
    await save(ng);
    cleanup();return;
  }
  // ingame
  const ng=jclone(gs);
  returnTiles(ng,myIdx);
  ng.players[myIdx].offline=true;
  ng.log=[`${gs.players[myIdx].name} đã rời phòng.`,...(ng.log||[])].slice(0,20);
  if(ng.hostIdx===myIdx){
    const nh=ng.players.findIndex((p,i)=>i!==myIdx&&!p.offline);
    if(nh>=0)ng.hostIdx=nh;
  }
  if(ng.turn===myIdx)ng.turn=nextAliveTurn(ng,ng.turn-1<0?0:ng.turn-1);
  ng.rolled=false;
  await save(ng);
  cleanup();
};

window.doKick=async function(idx){
  if(!gs||!amHost())return;
  if(!confirm(`Kick ${gs.players[idx]?.name} ra khỏi phòng?`))return;
  const ng=jclone(gs);
  if(screen==="waiting"){
    const name=ng.players[idx].name;
    ng.kickedName=name;
    ng.players.splice(idx,1);
    if(ng.hostIdx>idx)ng.hostIdx--;
  } else {
    ng.kickedIdx=idx;
    returnTiles(ng,idx);
    ng.players[idx].offline=true;
    ng.log=[`${ng.players[idx].name} đã rời phòng.`,...(ng.log||[])].slice(0,20);
    if(ng.turn===idx){ng.turn=nextAliveTurn(ng,idx-1<0?0:idx-1);ng.rolled=false;}
  }
  await save(ng);
};

function doRoll(){
  if(rolling||!gs||gs.rolled||gs.turn!==myIdx||gs.players[myIdx]?.offline)return;
  rolling=true;render();let cnt=0;
  const iv=setInterval(()=>{
    localDice=roll6();
    const dw=document.querySelector(".dw");
    if(dw)dw.innerHTML=localDice.map(d=>dieSVG(d,true)).join("");
    cnt++;
    if(cnt>=12){
      clearInterval(iv);rolling=false;
      const final=roll6();localDice=final;
      const ng=applyRoll(gs,myIdx,final);
      save(ng);gs=ng;render();
    }
  },70);
}

async function doNext(){
  if(!gs)return;
  const ng=jclone(gs);
  ng.turn=nextAliveTurn(ng,ng.turn);
  ng.rolled=false;
  await save(ng);gs=ng;render();
}

async function skipOffline(){
  if(!gs||!amHost())return;
  const cur=gs.players[gs.turn];
  if(!cur?.offline)return;
  const ng=jclone(gs);
  ng.lastMsg=`Bỏ qua lượt của ${cur.name} (offline).`;
  ng.turn=nextAliveTurn(ng,ng.turn);
  ng.rolled=false;
  await save(ng);
}

render();
</script>
</body>
</html>
