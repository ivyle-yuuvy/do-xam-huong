<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Đổ Xăm Hường</title>
<meta name="theme-color" content="#9B1B1B"/>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF3E0;font-family:serif;font-size:18px;min-height:100vh;overflow-x:hidden}

/* ── LOBBY / WAITING / END ── */
.page{max-width:480px;margin:0 auto;padding:1.25rem 1rem}
.card{background:rgba(245,237,214,0.96);border:1px solid #B8860B80;border-radius:10px;padding:14px 16px;margin-bottom:12px}
h1{font-size:26px;font-weight:500;color:#9B1B1B;text-align:center}
.sub{font-size:13px;color:#B8860B;text-align:center;letter-spacing:.15em;margin-bottom:4px}
.divr{display:flex;align-items:center;gap:8px;margin:10px 0}
.divr>div:first-child,.divr>div:last-child{flex:1;height:.5px;background:#B8860B60}
.dia{width:6px;height:6px;background:#B8860B;transform:rotate(45deg)}
input{width:100%;padding:8px 12px;border:1px solid #B8860B60;border-radius:6px;font-size:14px;background:#FAF3E0;color:#2C1810;font-family:serif;outline:none}
.btn{padding:9px 18px;border-radius:6px;font-size:14px;font-family:serif;cursor:pointer;border:none;transition:opacity .15s}
.bp{background:#9B1B1B;color:#FFF5E6;border:1px solid #9B1B1B}
.bp:disabled{background:#C9828240;border-color:transparent;cursor:not-allowed}
.bs{background:transparent;color:#7A5C3A;border:1px solid #B8860B60}
.bd{background:transparent;color:#9B1B1B;border:1px solid #9B1B1B60;font-size:12px;padding:4px 10px}
.bf{width:100%;padding:11px}
.code{font-size:28px;font-weight:500;color:#B8860B;letter-spacing:.25em;text-align:center;margin:8px 0}
.pr{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:.5px solid #B8860B30}
.av{min-width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.on{background:#22c55e}.off2{background:#9ca3af}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px}
.bhost{background:#fef9c3;color:#854d0e}
.bready{background:#dcfce7;color:#166534}
.boff{background:#f3f4f6;color:#6b7280}
.hw{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.hi{display:flex;flex-direction:column;align-items:center;gap:1px}
.tl{font-size:10px;font-weight:500;text-align:center;font-family:serif;margin-bottom:2px}
.tc{font-size:9px;text-align:center;font-family:sans-serif}
.tp{font-size:9px;color:#8B6914;text-align:center;font-family:sans-serif}

/* ── GAME TABLE ── */
.table{
  width:100vw;height:100vh;
  background:#FAF3E0;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.table::before{display:none}
/* table border */
.table-border{
  position:absolute;inset:12px;border-radius:50px;
  border:3px solid #B8860B60;pointer-events:none;box-shadow:inset 0 0 60px rgba(0,0,0,0.4);
}

/* CENTER AREA */
.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  z-index:10;
}
.game-title{color:#D4A017;font-size:14px;letter-spacing:.2em;opacity:.8;margin-bottom:4px}
.dice-row{display:flex;gap:6px;justify-content:center}
.msg-box{
  background:rgba(0,0,0,0.6);border:1px solid #B8860B80;border-radius:8px;
  padding:6px 14px;max-width:280px;text-align:center;
  font-size:12px;color:#FFF5E6;line-height:1.4;
}
.msg-box.special{border-color:#9B1B1B;color:#FCA5A5}
.action-row{display:flex;gap:8px;justify-content:center;margin-top:4px}
.gbtn{
  padding:8px 16px;border-radius:6px;font-size:13px;font-family:serif;cursor:pointer;
  border:1px solid #B8860B;background:rgba(0,0,0,0.5);color:#D4A017;
  transition:all .15s;
}
.gbtn:hover{background:rgba(180,134,11,0.2)}
.gbtn.primary{background:#9B1B1B;border-color:#9B1B1B;color:#FFF5E6}
.gbtn.primary:hover{background:#7a1515}
.gbtn:disabled{opacity:.4;cursor:not-allowed}
.trang-box{
  background:rgba(155,27,27,0.3);border:1px solid #9B1B1B80;border-radius:6px;
  padding:4px 12px;font-size:11px;color:#FCA5A5;text-align:center;
}
.stock-row{display:flex;gap:6px;justify-content:center;align-items:flex-end}

/* PLAYER SEATS */
.seat{
  position:absolute;z-index:20;
  background:rgba(0,0,0,0.55);border:1.5px solid #B8860B50;border-radius:12px;
  padding:8px 12px;min-width:140px;max-width:180px;
  backdrop-filter:blur(4px);
  transition:border-color .3s,box-shadow .3s;
}
.seat.active{border-color:#D4A017;box-shadow:0 0 16px rgba(212,160,23,0.4)}
.seat.ofl{opacity:.45}
.seat-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.seat-name{font-size:12px;color:#D4A017;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.seat-pts{font-size:18px;font-weight:500;color:#fff;text-align:center;margin-bottom:4px}
.seat-pts.active{color:#D4A017}
.seat-info{font-size:10px;color:#9ca3af;text-align:center}
.seat-trang{font-size:10px;color:#FCA5A5;text-align:center}
.seat-kick{background:transparent;border:1px solid #9B1B1B60;color:#FCA5A5;border-radius:4px;font-size:10px;padding:1px 5px;cursor:pointer}
.hand-mini{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:4px}
/* seat positions */
.s-tl{top:16px;left:16px}
.s-tc{top:16px;left:50%;transform:translateX(-50%)}
.s-tr{top:16px;right:16px}
.s-bl{bottom:16px;left:16px}
.s-bc{bottom:16px;left:50%;transform:translateX(-50%)}
.s-br{bottom:16px;right:16px}
.s-ml{top:50%;left:16px;transform:translateY(-50%)}
.s-mr{top:50%;right:16px;transform:translateY(-50%)}

/* top bar */
.top-bar{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 16px;z-index:30;
  background:linear-gradient(to bottom,rgba(0,0,0,0.5),transparent);
}
.top-bar-left{color:#D4A017;font-size:13px;letter-spacing:.05em}
.top-bar-right{display:flex;gap:8px}

/* LOG */
.log-panel{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:min(360px,80vw);z-index:25;
  background:rgba(0,0,0,0.5);border:1px solid #B8860B40;border-radius:8px;
  max-height:64px;overflow-y:auto;padding:4px 10px;
}
.log-line{font-size:10px;padding:1px 0;color:#d1c5a8}
.log-line.new2{color:#fff}
</style>
</head>
<body>
<div id="app">Đang tải...</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const db=getDatabase(initializeApp({
  apiKey:"AIzaSyBjhGUkpkAiYvzIUPhnWyuyj3SQJU4LSnw",
  authDomain:"do-xam-huong.firebaseapp.com",
  databaseURL:"https://do-xam-huong-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"do-xam-huong",
  storageBucket:"do-xam-huong.firebasestorage.app",
  messagingSenderId:"273822809628",
  appId:"1:273822809628:web:867e4049d10e0641f8e9d9"
}));

const TILES=[
  {name:"Tú tài",count:32,points:1,col:"#4A7FA4",han:"秀才"},
  {name:"Cử nhân",count:16,points:2,col:"#2E7D4F",han:"舉人"},
  {name:"Tiến sĩ",count:8,points:4,col:"#7B3FA0",han:"進士"},
  {name:"Hội nguyên",count:4,points:8,col:"#C07000",han:"會元"},
  {name:"Thám hoa",count:4,points:16,col:"#0A4D2A",han:"探花"},
  {name:"Trạng nguyên",count:1,points:32,col:"#9B1B1B",han:"狀元"},
];
const TOTAL=65;
const TEN=["nhất","nhị","tam","tứ","ngũ","lục"];

function initStock(){return TILES.map(t=>({...t,remaining:t.count}));}
function roll6(){return Array.from({length:6},()=>Math.floor(Math.random()*6)+1);}
function makeid(){return Math.random().toString(36).slice(2,7).toUpperCase();}
function jclone(o){return JSON.parse(JSON.stringify(o));}

function evalRoll(dice){
  const c=[0,0,0,0,0,0];dice.forEach(d=>c[d-1]++);const h=c[3];
  if(h===6)return{tile:5,label:"Lục hường — THẮNG NGAY!",ta:9999,special:"instant_win"};
  const ld=[0,1,2,4,5].find(k=>c[k]===6);
  if(ld!==undefined)return{tile:5,label:`Lục tử ${TEN[ld]} — Trạng nguyên!`,ta:7500+ld,special:null};
  const ng=[0,1,2,4,5].find(k=>c[k]===5);
  if(ng!==undefined){const o=dice.find(d=>d!==ng+1)||0;const da=o===4;
    return{tile:5,label:`Ngũ tử ${TEN[ng]}${da?" đại ấn":""}`,ta:da?6500:3000+(ng+1)*10+o,special:null};}
  if(h===4){const r=dice.filter(d=>d!==4);const s=r[0]+r[1];const ch=r[0]===r[1];
    return{tile:5,label:`Tứ hường ${ch?"cáp chính":"cáp xiên"} (tuổi ${s})`,ta:ch?5000+s:4000+s,special:null};}
  const tam=[0,1,2,3,4,5].filter(k=>c[k]===3);
  if(tam.length===2)return{tile:-1,label:"Huệ (Trùng tam) — mất lượt!",ta:0,special:"hue"};
  const tu=[0,1,2,4,5].find(k=>c[k]===4);
  if(tu!==undefined)return{tile:4,label:`Tứ tuyệt ${TEN[tu]} — Thám hoa!`,ta:0,special:null};
  const pr=[0,1,2,3,4,5].filter(k=>c[k]===2);
  if(pr.length===3)return{tile:4,label:"Phân cam — Thám hoa!",ta:0,special:null};
  if(h===3)return{tile:3,label:"Tam hường — Hội nguyên!",ta:0,special:null};
  if(h===2)return{tile:1,label:"Nhị hường — Cử nhân!",ta:0,special:null};
  if(h===1)return{tile:0,label:"Nhất hường — Tú tài!",ta:0,special:null};
  return{tile:-1,label:"Không có mặt Hường",ta:0,special:null};
}

function nextAliveTurn(gs,from){
  const n=gs.players.length;let t=(from+1)%n;
  for(let k=0;k<n;k++){if(!gs.players[t].offline)return t;t=(t+1)%n;}
  return from;
}

function returnTiles(gs,pi){
  gs.players[pi].tiles.forEach((n,ti)=>{if(n>0){gs.stock[ti].remaining+=n;gs.stockLeft+=n;}});
  gs.players[pi].tiles=TILES.map(()=>0);gs.players[pi].points=0;
  if(gs.trangHolder===pi){gs.trangHolder=null;gs.trangAge=0;}
}

function applyRoll(gs0,pi,dice){
  const gs=jclone(gs0);const ev=evalRoll(dice);const pn=gs.players[pi].name;
  gs.dice=dice;
  if(ev.special==="instant_win"){gs.lastMsg=`${pn}: ${ev.label}`;gs.phase="end";return gs;}
  if(ev.special==="hue"){gs.lastMsg=`${pn}: ${ev.label}`;gs.turn=nextAliveTurn(gs,gs.turn);gs.rolled=false;return gs;}
  let msg="";
  if(ev.tile===5){
    if(gs.trangHolder===null&&gs.stock[5].remaining>0){
      gs.players[pi].tiles[5]++;gs.players[pi].points+=32;gs.stock[5].remaining--;gs.stockLeft--;
      gs.trangHolder=pi;gs.trangAge=ev.ta;msg=`${pn}: ${ev.label} — đoạt Trạng!`;
    }else if(gs.trangHolder!==null&&ev.ta>gs.trangAge){
      const prev=gs.players[gs.trangHolder].name;
      gs.players[gs.trangHolder].tiles[5]--;gs.players[gs.trangHolder].points-=32;
      gs.players[pi].tiles[5]++;gs.players[pi].points+=32;
      gs.trangHolder=pi;gs.trangAge=ev.ta;msg=`${pn} cướp Trạng từ ${prev}!`;
    }else{msg=gs.trangHolder===null?`${pn}: ${ev.label} — hết thẻ!`:`${pn}: ${ev.label} — tuổi thấp hơn.`;}
  }else if(ev.tile>=0){
    const t=ev.tile;
    if(gs.stock[t].remaining>0){
      gs.players[pi].tiles[t]++;gs.players[pi].points+=TILES[t].points;
      gs.stock[t].remaining--;gs.stockLeft--;msg=`${pn}: ${ev.label} (+${TILES[t].points}đ)`;
    }else{msg=`${pn}: ${ev.label} — hết thẻ!`;}
  }else{msg=`${pn}: ${ev.label}`;}
  gs.lastMsg=msg;gs.log=[msg,...(gs.log||[])].slice(0,20);gs.rolled=true;
  if(gs.stockLeft<=0)gs.phase="end";
  return gs;
}

// ── SVG ──
function tileSVG(idx,w,h,faded){
  const t=TILES[idx];if(!t)return"";const rc=t.col;
  const chars=t.han.split("").map((ch,ci)=>
    `<text x="18" y="${42+ci*16}" text-anchor="middle" font-size="13" fill="${rc}" font-weight="bold" font-family="serif">${ch}</text>`
  ).join("");
  return`<svg width="${w}" height="${h}" viewBox="0 0 36 110" style="opacity:${faded?0.25:1};display:block">
    <rect x="6" y="18" width="24" height="82" rx="3" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="18" rx="9" ry="7" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="10" rx="6.5" ry="5.5" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="4" rx="4" ry="3.5" fill="#F5EDD6" stroke="#c8b06a" stroke-width="1"/>
    <ellipse cx="18" cy="1.2" rx="2" ry="1.5" fill="#F5EDD6" stroke="#c8b06a" stroke-width="0.8"/>
    ${chars}</svg>`;
}

function tileStackHTML(tile,idx){
  const n=Math.min(tile.remaining,4);const empty=tile.remaining===0;const rc=TILES[idx]?.col||"#888";
  let s=empty?tileSVG(idx,46,140,true):"";
  if(!empty)for(let k=0;k<n;k++)s+=`<div style="position:absolute;top:${k*2}px;left:${k*1}px">${tileSVG(idx,46,140,false)}</div>`;
  return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
    <div class="tl" style="color:${rc};font-size:12px;font-weight:600">${TILES[idx].name}</div>
    <div style="position:relative;width:46px;height:146px">${s}</div>
    <div class="tc" style="color:${empty?"#aaa":rc};font-size:11px;font-weight:500">${tile.remaining}/${tile.count}</div>
  </div>`;
}

function handMiniHTML(tiles){
  let h="";
  tiles.forEach((n,ti)=>{
    if(n<=0)return;
    let s="";
    for(let k=0;k<Math.min(n,3);k++)s+=`<div style="position:absolute;top:${k*2}px;left:${k*2}px">${tileSVG(ti,36,110,false)}</div>`;
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="position:relative;width:36px;height:${n>1?114:110}px">${s}</div>
      <div style="font-size:13px;color:${TILES[ti].col};font-family:sans-serif;text-align:center;font-weight:700;background:#fff;border-radius:4px;padding:2px 6px;border:1.5px solid ${TILES[ti].col}">×${n}</div>
    </div>`;
  });
  return h?`<div class="hand-mini">${h}</div>`:"";
}

function handHTML(tiles){
  const has=tiles.some(n=>n>0);
  if(!has)return`<div style="font-size:11px;color:#A08060;font-style:italic">Chưa có thẻ</div>`;
  let html="";
  tiles.forEach((n,ti)=>{
    if(n<=0)return;
    let stacks="";
    for(let k=0;k<Math.min(n,3);k++)stacks+=`<div style="position:absolute;top:${k*2}px;left:${k}px">${tileSVG(ti,27,83,false)}</div>`;
    html+=`<div class="hi">
      <div style="position:relative;width:27px;height:${n>1?80:75}px">${stacks}</div>
      ${n>1?`<div style="font-size:9px;color:${TILES[ti].col};font-family:sans-serif">×${n}</div>`:""}
    </div>`;
  });
  return`<div class="hw">${html}</div>`;
}

function dieSVG(val,rolling,size){
  size=size||50;
  const pos={1:[[50,50]],2:[[28,28],[72,72]],3:[[28,28],[50,50],[72,72]],
    4:[[28,28],[72,28],[28,72],[72,72]],5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
    6:[[28,22],[72,22],[28,50],[72,50],[28,78],[72,78]]};
  const isH=val===4;
  const dots=(pos[val]||[]).map(([cx,cy])=>
    `<circle cx="${cx}" cy="${cy}" r="${isH?10:8.5}" fill="${isH?"#C8330A":"#1a1a1a"}"/>`
  ).join("");
  return`<svg width="${size}" height="${size}" viewBox="0 0 100 100" style="filter:${rolling?"blur(1.5px)":"none"};display:block;border-radius:12px">
    <rect x="2" y="2" width="96" height="96" rx="16" fill="${isH?"#FFF0E8":"#FFFAF0"}" stroke="${isH?"#C8330A":"#B8860B"}" stroke-width="4"/>
    ${dots}</svg>`;
}

function divider(){return`<div class="divr"><div></div><div class="dia"></div><div></div></div>`;}

// ── SEAT POSITIONS ──
// order: tl, tr, bl, br, tc, bc  (for 2-6 players)
const SEAT_POS=[
  ["s-tl","s-tr","s-bl","s-br","s-tc","s-bc"],  // 2-6p layout
];
function seatClass(idx,total){
  const layouts={
    2:["s-bl","s-br"],
    3:["s-tl","s-tr","s-bc"],
    4:["s-tl","s-tr","s-bl","s-br"],
    5:["s-tl","s-tr","s-bl","s-br","s-tc"],
    6:["s-tl","s-tc","s-tr","s-bl","s-bc","s-br"],
  };
  return(layouts[total]||layouts[4])[idx]||"s-tl";
}

// ── STATE ──
let screen="lobby",myName="",myIdx=null,roomCode="",isHost=false;
let gs=null,rolling=false,localDice=[1,2,3,4,5,6],unsub=null,lastOC=null;

function amHost(){return gs&&gs.hostIdx===myIdx;}
async function save(s){await set(ref(db,`rooms/${roomCode}`),jclone(s));}

function subscribe(code){
  unsub=onValue(ref(db,`rooms/${code}`),snap=>{
    const data=snap.val();if(!data)return;
    if(screen==="waiting"&&myIdx!==null&&gs){
      const mn=gs.players[myIdx]?.name;
      if(!data.players?.some(p=>p.name===mn)&&mn){
        if(data.kickedName===mn)alert("Bạn đã bị đuổi ra khỏi phòng!");
        cleanup();return;
      }
      if(data.players.length<gs.players.length){
        const ni=data.players.findIndex(p=>p.name===mn);
        if(ni>=0){myIdx=ni;isHost=data.hostIdx===myIdx;}
      }
    }
    if(screen==="game"&&myIdx!==null&&data.kickedIdx===myIdx){
      alert("Bạn đã bị đuổi ra khỏi phòng!");
      const ng=jclone(data);ng.kickedIdx=null;set(ref(db,`rooms/${code}`),ng);
      cleanup();return;
    }
    gs=data;
    if(gs.phase==="game"&&screen==="waiting")screen="game";
    if(gs.phase==="end"&&(screen==="game"||screen==="waiting"))screen="end";
    if(screen==="game"&&gs.phase==="game"){
      const oc=gs.players.filter(p=>!p.offline).length;
      if(oc===1&&gs.players[myIdx]&&!gs.players[myIdx].offline&&lastOC>1){
        lastOC=oc;
        if(confirm("Chỉ còn bạn trong phòng. Bạn có muốn đóng phòng không?")){endGame();return;}
      }
      lastOC=oc;
      if(amHost()){const cur=gs.players[gs.turn];if(cur?.offline)setTimeout(skipOffline,1500);}
    }
    render();
  });
}

function cleanup(){
  if(unsub)unsub();
  screen="lobby";myIdx=null;roomCode="";isHost=false;gs=null;lastOC=null;render();
}

// ── RENDER ──
function renderLobby(){
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FAF3E0">
  <div class="page" style="width:100%">
    <div style="text-align:center;margin-bottom:20px;padding-top:12px">
      <div class="sub">❧ CUNG ĐÌNH HUẾ ❧</div>
      <h1 style="color:#D4A017;text-shadow:0 2px 8px rgba(212,160,23,0.4)">Đổ Xăm Hường</h1>
      <div style="font-size:12px;color:#8B6914">Trò chơi dân gian · Cung đình Huế</div>
      ${divider()}
    </div>
    <div class="card">
      <div style="font-size:13px;color:#7A5C3A;margin-bottom:8px">Tên của bạn</div>
      <input id="inp-name" type="text" placeholder="Nhập tên..." value="${myName}"/>
    </div>
    <div class="card">
      <div style="font-size:13px;color:#7A5C3A;margin-bottom:10px">Tạo phòng mới</div>
      <button class="btn bp bf" id="btn-create">⟡ Tạo phòng</button>
    </div>
    <div class="card">
      <div style="font-size:13px;color:#7A5C3A;margin-bottom:8px">Vào phòng có sẵn</div>
      <input id="inp-code" type="text" placeholder="Nhập mã phòng..." style="text-align:center;letter-spacing:.2em;font-size:16px;text-transform:uppercase;margin-bottom:10px"/>
      <button class="btn bs bf" id="btn-join">→ Vào phòng</button>
    </div>
    <div class="card" style="border:1.5px dashed #B8860B60">
      <div style="font-size:12px;color:#A08060;margin-bottom:8px">Chế độ thử nghiệm giao diện</div>
      <button class="btn bs bf" id="btn-testui">🎨 Test UI (không cần phòng)</button>
    </div>
  </div></div>`;
}

function renderWaiting(){
  if(!gs)return`<div style="text-align:center;padding:40px;color:#D4A017">Đang tải...</div>`;
  const ps=gs.players||[];
  const iAm=amHost();
  const nonHost=ps.filter((_,k)=>k!==gs.hostIdx);
  const allReady=nonHost.length===0||nonHost.every(p=>p.ready);
  const canStart=allReady&&ps.length>=2;
  const rows=ps.map((p,k)=>{
    const isMe=k===myIdx;const iH=k===gs.hostIdx;
    const dot=`<span class="dot ${p.offline?"off2":"on"}"></span>`;
    const bgs=(iH?`<span class="badge bhost">Chủ phòng</span>`:"")
      +(p.ready&&!iH?`<span class="badge bready">Sẵn sàng</span>`:"");
    const kick=iAm&&k!==myIdx?`<button class="btn bd" onclick="doKick(${k})">Kick</button>`:"";
    return`<div class="pr">
      <div class="av" style="background:${iH?"#9B1B1B":"#B8860B"}">${k+1}</div>
      <div style="flex:1">${dot}<span style="font-size:14px;color:#2C1810">${p.name}${isMe?" (bạn)":""}</span>${bgs}</div>
      ${kick}</div>`;
  }).join("");
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FAF3E0">
  <div class="page" style="width:100%">
    <div style="text-align:center;margin-bottom:16px;padding-top:12px">
      <h1 style="font-size:20px;color:#9B1B1B">Phòng chờ</h1>
      ${divider()}
      <div class="code">${roomCode}</div>
      <div style="font-size:12px;color:#8B6914">Chia sẻ mã · ${ps.length} người</div>
    </div>
    <div class="card">${rows}</div>
    ${iAm
      ?`<button class="btn bp bf" id="btn-start"${canStart?"":" disabled"}>⟡ Bắt đầu chơi (${ps.length} người)</button>`
      :`<button class="btn ${gs.players[myIdx]?.ready?"bs":"bp"} bf" id="btn-ready">
          ${gs.players[myIdx]?.ready?"✕ Hủy":"⚑ Sẵn sàng"}
        </button>`
    }
    <button class="btn bs bf" onclick="doLeave()" style="margin-top:8px">← Thoát phòng</button>
  </div></div>`;
}

function renderGame(){
  if(!gs)return`<div style="text-align:center;padding:40px;color:#D4A017">Đang tải...</div>`;
  const ps=gs.players;const iAm=amHost();
  const isMyTurn=gs.turn===myIdx;const cur=ps[gs.turn];
  const displayDice=rolling?localDice:(gs.dice||localDice);
  const msgSpecial=gs.lastMsg&&(gs.lastMsg.includes("Trạng")||gs.lastMsg.includes("THẮNG"));
  const trangText=gs.trangHolder!==null&&ps[gs.trangHolder]
    ?`◈ ${ps[gs.trangHolder].name} giữ Trạng · tuổi ${gs.trangAge>=9000?"∞":gs.trangAge}`
    :`Chưa có ai giữ Trạng`;
  const trangStyle=gs.trangHolder!==null&&ps[gs.trangHolder]
    ?`background:#FFF8ED;border:2px solid #B8860B;border-radius:8px;padding:9px 22px;font-size:15px;color:#2C1810;text-align:center;font-weight:500;`
    :`background:#9B1B1B;border:2px solid #9B1B1B;border-radius:8px;padding:9px 22px;font-size:15px;color:#ffffff;text-align:center;font-weight:500;`;

  const seatsHTML=ps.map((p,si)=>{
    const isMe=si===myIdx;const active=si===gs.turn&&!p.offline;
    const cls=seatClass(si,ps.length);
    const dot=`<span class="dot ${p.offline?"off2":"on"}"></span>`;
    const kick=iAm&&si!==myIdx&&!p.offline
      ?`<button class="seat-kick" onclick="doKick(${si})">×</button>`:"";
    return`<div class="seat${active?" active":""}${p.offline?" ofl":""} ${cls}">
      <div class="seat-top">
        ${dot}<span class="seat-name">${p.name}${isMe?"★":""}${si===gs.hostIdx?" 👑":""}</span>${kick}
      </div>
      <div class="seat-pts${active?" active":""}">${p.points}đ</div>
      ${gs.trangHolder===si?`<div class="seat-trang">◈ Trạng</div>`:""}
      ${p.offline?`<div class="seat-info">(offline)</div>`:""}
      ${handMiniHTML(p.tiles)}
    </div>`;
  }).join("");

  const diceHTML=displayDice.map(d=>dieSVG(d,rolling,62)).join("");

  return`<div class="table">
    <div class="table-border"></div>
    ${seatsHTML}

    <!-- TOP BAR -->
    <div class="top-bar">
    <div class="top-bar-left">
      <span style="color:#9B1B1B;font-size:17px;font-weight:600">Đổ Xăm Hường</span>
      <span style="margin:0 12px;color:#B8860B">·</span>
      <span style="color:#5C3D0E">Phòng: <b style="color:#9B1B1B;letter-spacing:.12em">${roomCode}</b></span>
      <span style="margin:0 12px;color:#B8860B">·</span>
      <span style="color:#5C3D0E">Thẻ còn: <b style="color:#9B1B1B">${gs.stockLeft}</b></span>
    </div>
      <div class="top-bar-right">
        ${iAm?`<button class="gbtn" style="font-size:15px;padding:8px 18px;background:#F5EDD6;color:#9B1B1B;border-color:#9B1B1B" id="btn-end">Kết thúc</button>`:""}
        <button class="gbtn" style="font-size:15px;padding:8px 18px;background:#F5EDD6;color:#5C3D0E;border-color:#B8860B" onclick="doLeave()">Thoát</button>
      </div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="game-title">— TÔ SỨ —</div>
      <div class="dice-row">${diceHTML}</div>
      ${gs.lastMsg&&!rolling?`<div class="msg-box${msgSpecial?" special":""}">${gs.lastMsg}</div>`:""}
      <div style="${trangStyle}">${trangText}</div>
      <div class="action-row">
        ${isMyTurn&&!gs.rolled&&!ps[myIdx]?.offline?`<button class="gbtn primary" id="btn-roll">${rolling?"Đang gieo...":"⚄ Đổ xúc xắc"}</button>`:""}
        ${isMyTurn&&gs.rolled?`<button class="gbtn" id="btn-next">Lượt tiếp →</button>`:""}
        ${cur?.offline&&iAm?`<button class="gbtn" id="btn-skip">Bỏ qua offline</button>`:""}
        ${!isMyTurn&&!cur?.offline?`<div style="font-size:12px;color:#9ca3af">Chờ ${cur?.name}...</div>`:""}
      </div>
      <div class="stock-row">
        ${gs.stock.map((s,si2)=>tileStackHTML(s,si2)).join("")}
      </div>
    </div>

    <!-- LOG -->
    ${gs.log?.length?`<div class="log-panel">${gs.log.map((l,li)=>`<div class="log-line${li===0?" new2":""}">${l}</div>`).join("")}</div>`:""}
  </div>`;
}

function renderEnd(){
  if(!gs)return"";
  const sorted=[...gs.players].map((p,k)=>({...p,oi:k}))
    .sort((a,b)=>a.offline===b.offline?b.points-a.points:a.offline?1:-1);
  const rows=sorted.map((p,k)=>`
    <div class="card" style="${k===0&&!p.offline?"background:#FDEAEA;border-color:#9B1B1B80":""}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <div class="av" style="background:${k===0&&!p.offline?"#9B1B1B":k===1?"#B8860B":"#7A5C3A"}">${k+1}</div>
        <div style="flex:1;font-size:14px;color:#2C1810">${p.name}${p.oi===myIdx?" (bạn)":""}
          ${p.offline?`<span class="badge boff" style="margin-left:6px">offline</span>`:""}
        </div>
        <div style="font-size:18px;font-weight:500;color:${p.offline?"#9ca3af":"#9B1B1B"}">${p.points}<span style="font-size:11px;color:#7A5C3A"> đ</span></div>
      </div>
      ${!p.offline?handHTML(p.tiles):""}
    </div>`).join("");
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FAF3E0">
  <div class="page" style="width:100%">
    <div style="text-align:center;margin-bottom:16px;padding-top:12px">
      <h1 style="font-size:22px;color:#9B1B1B">Kết quả</h1>${divider()}
    </div>
    ${rows}
    <button class="btn bs bf" id="btn-home" style="margin-top:8px">↺ Về trang chủ</button>
  </div></div>`;
}

function render(){
  const app=document.getElementById("app");
  if(screen==="lobby")app.innerHTML=renderLobby();
  else if(screen==="waiting")app.innerHTML=renderWaiting();
  else if(screen==="game")app.innerHTML=renderGame();
  else app.innerHTML=renderEnd();
  bindEvents();
}

function bindEvents(){
  document.getElementById("btn-testui")?.addEventListener("click",doTestUI);
  document.getElementById("inp-name")?.addEventListener("input",e=>myName=e.target.value);
  document.getElementById("btn-create")?.addEventListener("click",doCreate);
  document.getElementById("btn-join")?.addEventListener("click",()=>{
    const c=document.getElementById("inp-code")?.value?.trim()?.toUpperCase();
    if(c)doJoin(c);
  });
  document.getElementById("btn-start")?.addEventListener("click",doStart);
  document.getElementById("btn-ready")?.addEventListener("click",doReady);
  document.getElementById("btn-roll")?.addEventListener("click",doRoll);
  document.getElementById("btn-next")?.addEventListener("click",doNext);
  document.getElementById("btn-skip")?.addEventListener("click",skipOffline);
  document.getElementById("btn-end")?.addEventListener("click",()=>{if(confirm("Kết thúc ván?"))endGame();});
  document.getElementById("btn-home")?.addEventListener("click",cleanup);
}

// ── ACTIONS ──
function doTestUI(){
  myName="Test"; myIdx=0; roomCode="TEST"; isHost=true;
  gs={
    phase:"game", hostIdx:0,
    players:[
      {name:"Nguyễn Văn A",tiles:[3,2,1,0,0,0],points:11,ready:true,offline:false},
      {name:"Trần Thị B",tiles:[1,0,0,1,0,0],points:9,ready:true,offline:false},
      {name:"Lê C (offline)",tiles:[0,1,0,0,0,0],points:2,ready:true,offline:true},
      {name:"Phạm D",tiles:[2,0,1,0,0,0],points:6,ready:true,offline:false},
    ],
    stock:initStock().map((s,i)=>{
      const taken=[3,2,1,0,0,0];
      return{...s,remaining:Math.max(0,s.remaining-taken[i]*2)};
    }),
    stockLeft:52, turn:0, trangHolder:1, trangAge:4008,
    dice:[4,4,1,3,2,6], rolled:true,
    lastMsg:"Nguyễn Văn A: Tứ hường cáp xiên (tuổi 4) — đoạt Trạng!",
    log:[
      "Nguyễn Văn A: Tứ hường cáp xiên (tuổi 4) — đoạt Trạng!",
      "Trần Thị B: Nhị hường — Cử nhân! (+2đ)",
      "Lê C (offline): Không có mặt Hường.",
      "Phạm D: Nhất hường — Tú tài! (+1đ)",
    ],
  };
  screen="game"; render();
}

async function doCreate(){
  if(!myName.trim()){alert("Nhập tên trước!");return;}
  const code=makeid();roomCode=code;isHost=true;myIdx=0;
  const initGs={phase:"waiting",hostIdx:0,
    players:[{name:myName.trim(),tiles:TILES.map(()=>0),points:0,ready:true,offline:false}],
    stock:initStock(),stockLeft:TOTAL,turn:0,trangHolder:null,trangAge:0,
    dice:[1,2,3,4,5,6],rolled:false,lastMsg:"",log:[]};
  await set(ref(db,`rooms/${code}`),jclone(initGs));
  gs=initGs;screen="waiting";subscribe(code);render();
}

async function doJoin(code){
  if(!myName.trim()){alert("Nhập tên trước!");return;}
  const snap=await get(ref(db,`rooms/${code}`));
  if(!snap.exists()){alert("Không tìm thấy phòng!");return;}
  const state=snap.val();
  if(state.phase!=="waiting"){alert("Phòng đã bắt đầu!");return;}
  myIdx=state.players.length;roomCode=code;isHost=false;
  state.players.push({name:myName.trim(),tiles:TILES.map(()=>0),points:0,ready:false,offline:false});
  await set(ref(db,`rooms/${code}`),jclone(state));
  gs=state;screen="waiting";subscribe(code);render();
}

async function doStart(){
  if(!gs||gs.players.length<2)return;
  const ng=jclone(gs);ng.phase="game";lastOC=ng.players.length;
  await save(ng);gs=ng;screen="game";render();
}

async function doReady(){
  if(!gs)return;
  const ng=jclone(gs);ng.players[myIdx].ready=!ng.players[myIdx].ready;
  await save(ng);gs=ng;render();
}

async function endGame(){
  const ng=jclone(gs);ng.phase="end";await save(ng);gs=ng;screen="end";render();
}

window.doLeave=async function(){
  if(!gs){cleanup();return;}
  if(screen==="game"&&!confirm("Bạn có chắc muốn thoát phòng không?"))return;
  if(screen==="waiting"){
    const ng=jclone(gs);ng.players.splice(myIdx,1);
    if(ng.hostIdx>myIdx)ng.hostIdx--;
    else if(ng.hostIdx===myIdx)ng.hostIdx=0;
    await save(ng);cleanup();return;
  }
  const ng=jclone(gs);
  returnTiles(ng,myIdx);ng.players[myIdx].offline=true;
  ng.log=[`${gs.players[myIdx].name} đã rời phòng.`,...(ng.log||[])].slice(0,20);
  if(ng.hostIdx===myIdx){
    const nh=ng.players.findIndex((p,k)=>k!==myIdx&&!p.offline);
    if(nh>=0)ng.hostIdx=nh;
  }
  if(ng.turn===myIdx){ng.turn=nextAliveTurn(ng,ng.turn);ng.rolled=false;}
  await save(ng);cleanup();
};

window.doKick=async function(idx){
  if(!gs||!amHost())return;
  if(!confirm(`Kick ${gs.players[idx]?.name}?`))return;
  const ng=jclone(gs);
  if(screen==="waiting"){
    ng.kickedName=ng.players[idx].name;ng.players.splice(idx,1);
    if(ng.hostIdx>idx)ng.hostIdx--;
  }else{
    ng.kickedIdx=idx;returnTiles(ng,idx);ng.players[idx].offline=true;
    ng.log=[`${ng.players[idx].name} đã rời phòng.`,...(ng.log||[])].slice(0,20);
    if(ng.turn===idx){ng.turn=nextAliveTurn(ng,idx);ng.rolled=false;}
  }
  await save(ng);
};

function doRoll(){
  if(rolling||!gs||gs.rolled||gs.turn!==myIdx||gs.players[myIdx]?.offline)return;
  rolling=true;render();let cnt=0;
  const iv=setInterval(()=>{
    localDice=roll6();
    const dw=document.querySelector(".dice-row");
          if(dw)dw.innerHTML=localDice.map(d=>dieSVG(d,true,62)).join("");
    cnt++;
    if(cnt>=12){
      clearInterval(iv);rolling=false;
      const final=roll6();localDice=final;
      const ng=applyRoll(gs,myIdx,final);
      save(ng);gs=ng;render();
    }
  },70);
}

async function doNext(){
  if(!gs)return;
  const ng=jclone(gs);ng.turn=nextAliveTurn(ng,ng.turn);ng.rolled=false;
  await save(ng);gs=ng;render();
}

async function skipOffline(){
  if(!gs||!amHost())return;
  const cur=gs.players[gs.turn];if(!cur?.offline)return;
  const ng=jclone(gs);ng.lastMsg=`Bỏ qua lượt ${cur.name} (offline).`;
  ng.turn=nextAliveTurn(ng,ng.turn);ng.rolled=false;await save(ng);
}

render();
</script>
</body>
</html>
